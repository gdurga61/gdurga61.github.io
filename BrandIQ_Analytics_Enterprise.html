// Portfolio KPIs
const PORTFOLIO=[

  {brand:"NeuroShield Pro",ta:"Neurology",stage:"Launch",trx:18500,share:12.3,yoy:45.1,nps:68,persist:71.2,digitalIdx:7.8,payerAccess:65,somRank:4,avgPrice:1250,speakerCov:42,awareness:48},
  {brand:"ImmunoFlex 200",ta:"Immunology",stage:"Mature",trx:52000,share:28.7,yoy:3.2,nps:81,persist:85.3,digitalIdx:6.5,payerAccess:91,somRank:1,avgPrice:620,speakerCov:78,awareness:89},

// Top HCPs (30)
const HCPS=Array.from({length:30},(_,i)=>{

  return{id:i+1,name:`Dr. ${names[i]}`,spec:SPECS[i%5],region:REGIONS[i%5],decile:Math.max(1,10-Math.floor(i/3)),trx:Math.round(195-i*5.5+Math.random()*15),nrx:Math.round(52-i*1.5+Math.random()*8),share:+(32-i*.8+Math.random()*5).toFixed(1),calls:Math.round(10+Math.random()*8),lastCall:Math.round(2+Math.random()*28),trend:["↑","↑","→","↑","↓","↑","→","↑","↓","→"][i%10],segment:seg,potential:i<8?"High":i<18?"Medium":"Low",digitalPref:["Email","Rep Visit","Webinar","Email","Portal"][i%5],mslInteract:Math.round(Math.random()*4)};

  refToFill:MO.map((_,i)=>+(65+i*.8+Math.random()*4).toFixed(1)),
  daysToFill:MO.map((_,i)=>+(12-i*.3+Math.random()*2).toFixed(1)),

const CRM={totalCalls:MO.map((_,i)=>Math.round(5800*(1+.05*i/14)*(1+(Math.random()-.5)*.08))),
  uniqueHCPs:MO.map((_,i)=>Math.round(2400*(1+.08*i/14)*(1+(Math.random()-.5)*.06))),

  avgCallLen:MO.map((_,i)=>+(6.2+Math.random()*1.5).toFixed(1)),

// Komodo Patient
const KOM={funnel:{l:["Diagnosed HFrEF","Treated (any Rx)","On ARNI/SGLT2i","On CardioStabil XR","Hub Enrolled","PA Approved","Filled 1st Rx","Adherent (PDC≥80%)","Persistent (12mo)"],v:[850000,720000,410000,185000,142000,128000,118000,96000,78000]},

  switchTo:{"HeartGuard Plus":22,"PulseFix 10":15,"Generic":38,"Discontinued":25},

// MMIT Payer
const MMIT=PAYERS.map((p,i)=>({payer:p,lives:[145,98,52,38,22][i],trxShare:[38,32,12,10,8][i],status:["Preferred","Preferred","Non-Preferred","Preferred","N/A"][i],tier:["T2","T2","T3","T2","N/A"][i],copay:[35,47,5,8,285][i],pa:["No","No","Yes","Yes","No"][i],step:["No","No","Yes (ACEi first)","No","No"][i],ql:["No","90-day","30-day","No","No"][i],nbrTrend:[8.2,5.1,-1.2,3.4,12.5][i],rejRate:[8,12,28,15,0][i]}));

// DDD Channel
const DDD=CHANNELS.map((ch,i)=>({channel:ch,retail:[62,0,0,0,0,0,58,0][i],mail:[28,0,0,0,0,0,32,0][i],specialty:[10,0,0,0,0,0,10,0][i],total:[100,0,0,0,0,0,100,0][i],trend:[2.1,-0.5,8.4,3.2,-1.8,0.5,1.2,5.8][i],inventory:[22,0,0,0,0,0,18,0][i]}));

// IPSOS
const IPSOS={attr:["Efficacy","Safety","Ease of Use","Value","Clinical Data","Outcomes","Tolerability","Access"],
  scores:{"CardioStabil XR":[82,74,78,65,85,80,76,71],"HeartGuard Plus":[78,80,72,60,76,75,82,68],"PulseFix 10":[70,76,80,72,68,70,78,75]}};

/* ═══════════════════ APP ═══════════════════ */
function App(){
  const[pg,setPg]=useState("home");
  const[tab,setTab]=useState("portfolio");
  const[ai,setAi]=useState("");
  const[aiL,setAiL]=useState(false);
  const[key,setKey]=useState("");
  const[showK,setShowK]=useState(false);
  const[userData,setUserData]=useState(null);
  const[uploadName,setUploadName]=useState("");
  const R=useRef({});

  // Styles
  const C={bg:"rgba(12,18,35,0.85)",br:14,bd:"1px solid #1e2744"};
  const cd={background:C.bg,borderRadius:C.br,border:C.bd,padding:18,backdropFilter:"blur(8px)"};
  const bt=(c="#06b6d4",f)=>({padding:"8px 16px",borderRadius:8,border:"none",background:c,color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,width:f?"100%":"auto"});

  const callAI=async(p)=>{
    if(!key){setShowK(true);return}setAiL(true);
    try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,system:"You are a senior pharma commercial analytics VP. Provide concise, data-driven, actionable insights using pharma KPIs (TRx,NRx,NBRx,SOV,PDC,NPS). Format with bold headers and bullets.",messages:[{role:"user",content:p}]})});const d=await r.json();setAi(d.content?.[0]?.text||"Error")}catch(e){setAi("Error: "+e.message)}setAiL(false);
  };

  const handleUpload=(e)=>{
    const f=e.target.files[0];if(!f)return;setUploadName(f.name);

    setTimeout(()=>{
      if(tab==="brand"&&R.current.trx){

      }
      if(tab==="hub"&&R.current.hub1){
        Plotly.newPlot(R.current.hub1,[{x:MO,y:HUB.enrollment,name:"Enrollments",type:"bar",marker:{color:"#06b6d4"}},{x:MO,y:HUB.copayAssist,name:"Copay Assist",type:"bar",marker:{color:"#8b5cf6"}}],{barmode:"group",paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",font:{color:"#6b7280",size:9},xaxis:{gridcolor:"#1e2744",tickangle:-45},yaxis:{gridcolor:"#1e2744"},margin:{t:8,b:55,l:45,r:8},legend:{orientation:"h",y:1.1,font:{size:8}},height:260},{responsive:true,displayModeBar:false});
      }
      if(tab==="hub"&&R.current.hub2){
        Plotly.newPlot(R.current.hub2,[{x:MO,y:HUB.paApproval,name:"PA Approval %",type:"scatter",mode:"lines+markers",line:{color:"#10b981"}},{x:MO,y:HUB.refToFill,name:"Ref-to-Fill %",type:"scatter",mode:"lines+markers",line:{color:"#f59e0b"}}],{paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",font:{color:"#6b7280",size:9},xaxis:{gridcolor:"#1e2744",tickangle:-45},yaxis:{gridcolor:"#1e2744",range:[50,95]},margin:{t:8,b:55,l:40,r:8},legend:{orientation:"h",y:1.1,font:{size:8}},height:260},{responsive:true,displayModeBar:false});
      }
      if(tab==="crm"&&R.current.crm1){
        Plotly.newPlot(R.current.crm1,[{x:MO,y:CRM.totalCalls,name:"Total Calls",type:"bar",marker:{color:"#06b6d4"}},{x:MO,y:CRM.uniqueHCPs,name:"Unique HCPs",type:"bar",marker:{color:"#8b5cf6"}}],{barmode:"group",paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",font:{color:"#6b7280",size:9},xaxis:{gridcolor:"#1e2744",tickangle:-45},yaxis:{gridcolor:"#1e2744"},margin:{t:8,b:55,l:50,r:8},legend:{orientation:"h",y:1.1,font:{size:8}},height:250},{responsive:true,displayModeBar:false});
      }
      if(tab==="crm"&&R.current.crm2){
        Plotly.newPlot(R.current.crm2,[{x:MO,y:CRM.rxPerCall,name:"Rx/Call",type:"scatter",mode:"lines+markers",line:{color:"#10b981",width:2},yaxis:"y"},{x:MO,y:CRM.emailOpen,name:"Email Open %",type:"scatter",mode:"lines+markers",line:{color:"#f59e0b",width:2},yaxis:"y2"}],{paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",font:{color:"#6b7280",size:9},xaxis:{gridcolor:"#1e2744",tickangle:-45},yaxis:{gridcolor:"#1e2744",title:{text:"Rx/Call",font:{size:10}},side:"left"},yaxis2:{overlaying:"y",side:"right",title:{text:"Email Open %",font:{size:10}},gridcolor:"transparent"},margin:{t:8,b:55,l:45,r:45},legend:{orientation:"h",y:1.1,font:{size:8}},height:250},{responsive:true,displayModeBar:false});

  /* ═══ TABS ═══ */
  const TABS=[
    {id:"portfolio",l:"🏢 Portfolio",ic:"🏢"},
    {id:"brand",l:"📊 Brand Rx",ic:"📊"},
    {id:"mmx",l:"📈 Channel ROI",ic:"📈"},
    {id:"field",l:"🗺️ Field/SFE",ic:"🗺️"},
    {id:"hcp",l:"👨‍⚕️ Prescriber Seg",ic:"👨‍⚕️"},

    {id:"hub",l:"💊 Hub Metrics",ic:"💊"},
    {id:"payer",l:"💳 Payer/MMIT",ic:"💳"},
    {id:"crm",l:"📱 CRM/Digital",ic:"📱"},
    {id:"perception",l:"🔬 Perception",ic:"🔬"},
    {id:"upload",l:"📁 Data Upload",ic:"📁"},

                <b>Patient Data:</b> patient_id, diagnosis, treatment, adherence, switch_from<br/>
                <b>Channel Data:</b> channel, spend, impressions, clicks, conversions, roi<br/>
                <b>Payer Data:</b> payer, formulary_status, copay, pa_required, lives<br/>
                <b>CRM Data:</b> rep_id, hcp_id, call_date, call_type, samples, details
              </div>
            </div>
          </div>
          <div style={cd}>
            <h4 style={{fontSize:13,color:"#e2e8f0",margin:"0 0 12px"}}>📋 Uploaded Data Preview</h4>
            {userData?(
              <div style={{overflowX:"auto",maxHeight:400,overflow:"auto"}}>
                <table style={{width:"100%",fontSize:10,borderCollapse:"separate",borderSpacing:"0 1px"}}>
                  <thead><tr>{Object.keys(userData[0]||{}).map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
                  <tbody>{userData.slice(0,50).map((r,i)=><tr key={i}>{Object.values(r).map((v,j)=><td key={j} style={td}>{String(v).substring(0,30)}</td>)}</tr>)}</tbody>
                </table>
                {userData.length>50&&<div style={{fontSize:10,color:"#4b5563",marginTop:6}}>Showing 50 of {userData.length} rows</div>}
              </div>
            ):<div style={{textAlign:"center",padding:40,color:"#4b5563"}}>No data uploaded yet</div>}
          </div>
        </div>
      </div>)}

      {/* AI Insight */}
      {ai&&<div style={{...cd,marginTop:10,border:"1px solid #8b5cf633"}}><h4 style={{fontSize:13,color:"#8b5cf6",margin:"0 0 8px"}}>🤖 AI Executive Insights</h4><div style={{whiteSpace:"pre-wrap",fontSize:11,lineHeight:1.7,color:"#d1d5db",background:"#0a0f1a",padding:16,borderRadius:8}}>{ai}</div></div>}
    </div>);
  };

  /* ═══ RENDER ═══ */
  return(<div style={{minHeight:"100vh"}}>
    <nav style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 18px",borderBottom:"1px solid #1e2744",background:"rgba(6,10,19,0.95)",backdropFilter:"blur(10px)",position:"sticky",top:0,zIndex:50}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:18}}>💊</span>
        <span style={{fontSize:16,fontWeight:900,background:"linear-gradient(135deg,#06b6d4,#3b82f6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>BrandIQ Analytics</span>
        <span style={{fontSize:8,color:"#374151"}}>ENTERPRISE</span>
      </div>
      <div style={{display:"flex",gap:4}}>
        <button onClick={()=>setPg("home")} style={{padding:"5px 12px",borderRadius:6,border:"none",background:pg==="home"?"#06b6d4":"transparent",color:pg==="home"?"#fff":"#6b7280",cursor:"pointer",fontSize:11,fontWeight:600}}>🏠 Home</button>
        <button onClick={()=>setPg("dash")} style={{padding:"5px 12px",borderRadius:6,border:"none",background:pg==="dash"?"#06b6d4":"transparent",color:pg==="dash"?"#fff":"#6b7280",cursor:"pointer",fontSize:11,fontWeight:600}}>📊 Dashboard</button>
      </div>
    </nav>
    {pg==="home"&&<Home/>}{pg==="dash"&&<Dash/>}
    <footer style={{textAlign:"center",padding:"12px",borderTop:"1px solid #1e2744",marginTop:24}}><div style={{fontSize:9,color:"#2d3a5c"}}>BrandIQ Analytics Enterprise — IQVIA • IPSOS • Healthplix • Komodo • MMIT • Veeva CRM</div></footer>
    {showK&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}><div style={{...cd,maxWidth:420,width:"90%",padding:22}} className="fu"><h3 style={{margin:"0 0 6px",fontSize:15}}>🔑 API Key</h3><p style={{fontSize:11,color:"#4b5563",marginBottom:12}}>For AI Insights. Stays in browser only.</p><input type="password" placeholder="sk-ant-..." value={key} onChange={e=>setKey(e.target.value)} style={{...inp,marginBottom:10}}/><div style={{display:"flex",gap:6,justifyContent:"flex-end"}}><button onClick={()=>setShowK(false)} style={bt("#374151")}>Cancel</button><button onClick={()=>{if(key.trim())setShowK(false)}} style={bt("#10b981")}>Save</button></div></div></div>}
  </div>);
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
