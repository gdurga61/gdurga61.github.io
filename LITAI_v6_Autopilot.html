/* ===== STEP 1: PICO & Strategy ===== */
async function manStep1(){
  mDone(0);
  document.getElementById('msOut').textContent='Generating search strategy...';
  try{
    var r=await AI('Generate SLR search strategy:\nP:'+D.pico.P+'\nI:'+D.pico.I+'\nC:'+(D.pico.C||'Any')+'\nO:'+D.pico.O+'\nDates:'+D.dateFrom+'-'+D.dateTo+'\n\nProvide PubMed Boolean query in <QUERY> tags then explanation.','Expert medical librarian.',4096);
    D.strat=r;var m=r.match(/<QUERY>([\s\S]*?)<\/QUERY>/);
    D.pmq=m?m[1].trim():(D.pico.P+' AND '+D.pico.I);
    document.getElementById('msOut').textContent=D.strat;
    document.getElementById('msPmQ').value=D.pmq;
    ntf('Strategy ready!','success');
  }catch(e){
    D.pmq=D.pico.P+' AND '+D.pico.I;
    document.getElementById('msOut').textContent='Fallback: '+D.pmq;
    document.getElementById('msPmQ').value=D.pmq;
    ntf(e.message,'error');
  }
}

/* ===== STEP 2: Search ===== */
async function manStep2(){
  var q=document.getElementById('msPmQ').value.trim();
  if(!q){ntf('No query — go back to Step 1','error');return}
  D.pmq=q;
  document.getElementById('msSP').style.display='block';
  document.getElementById('msExB').disabled=true;
  var em=localStorage.getItem('le')||'litai@example.com';
  var all=[];
  try{
    if(D.dbs.indexOf('pubmed')>=0){msUSP('PubMed...',5);var a1=await sPM(em);all=all.concat(a1);document.getElementById('ms_pm').textContent=a1.length}
    if(D.dbs.indexOf('cochrane')>=0){msUSP('Cochrane...',25);var a2=await sCO(em);all=all.concat(a2);document.getElementById('ms_co').textContent=a2.length}
    if(D.dbs.indexOf('ctgov')>=0){msUSP('ClinicalTrials.gov...',45);var a3=await sCT();all=all.concat(a3);document.getElementById('ms_ct').textContent=a3.length}
    if(D.dbs.indexOf('scholar')>=0){msUSP('Semantic Scholar...',65);var a4=await sSS();all=all.concat(a4);document.getElementById('ms_ss').textContent=a4.length}
    msUSP('Done!',100);D.arts=all;
    document.getElementById('ms_tot').textContent=all.length;
    ntf(all.length+' records found','success');
    setTimeout(function(){document.getElementById('msSP').style.display='none';mDone(1);manDedup()},700);
  }catch(e){ntf(e.message,'error');document.getElementById('msSP').style.display='none'}
  document.getElementById('msExB').disabled=false;
}
function msUSP(t,p){document.getElementById('msSPT').textContent=t;document.getElementById('msSPB').style.width=p+'%'}

/* ===== STEP 3: Dedup ===== */
function manDedup(){
  var seen=new Map(),dups=[],uni=[],ma=0;
  D.arts.forEach(function(a){
    var k=a.doi||a.pmid||a.title.toLowerCase().replace(/[^a-z0-9]/g,'').substring(0,80);
    if(k&&seen.has(k)){var o=seen.get(k);o.arms++;if(o.arms===2)ma++;dups.push({o:o,d:a})}
    else{seen.set(k,a);uni.push(a)}
  });
  D.uniq=uni;D.dups=dups;
  document.getElementById('ms_dt').textContent=D.arts.length;
  document.getElementById('ms_dd').textContent=dups.length;
  document.getElementById('ms_dm').textContent=ma;
  document.getElementById('ms_du').textContent=uni.length;
  D.pc.identified=D.arts.length;D.pc.dupsRem=dups.length;D.pc.screened=uni.length;
  document.getElementById('msDLog').innerHTML=dups.length?
    dups.map(function(d,i){return '<div style="padding:6px;border-bottom:1px solid var(--bdr)"><span style="color:var(--am)">#'+(i+1)+'</span> '+d.o.title.substring(0,60)+'</div>'}).join(''):
    '<p style="color:var(--t3);padding:12px">No duplicates found.</p>';
}

/* ===== STEP 4: Screening ===== */
function manRenderScr(f){
  f=f||'all';var arts=D.uniq;
  if(f==='si')arts=arts.filter(function(a){return a.status==='included'});
  else if(f==='se')arts=arts.filter(function(a){return a.status==='excluded'});
  else if(f==='sm')arts=arts.filter(function(a){return a.status==='maybe'});
  else if(f==='p')arts=arts.filter(function(a){return a.status==='pending'});
  document.getElementById('msSList').innerHTML=arts.map(function(a){
    var cls=a.status==='included'?'si':a.status==='excluded'?'se':a.status==='maybe'?'sm':'';
    var acc=a.isFree?'<span class="abg af">Free</span>':'<span class="abg ap2">Paid</span>';
    var mab2=a.arms>1?'<span class="mab">'+a.arms+' arms</span>':'';
    var manTag=a.manualOverride?'<span style="display:inline-flex;padding:2px 6px;border-radius:8px;font-size:8px;font-weight:700;background:rgba(245,158,11,.15);color:var(--am);margin-left:6px">MANUAL</span>':'';
    var confPct=a.aiConf!=null?a.aiConf:a.status==='included'?85:a.status==='excluded'?78:a.status==='maybe'?60:50;
    var confCls=confPct>=80?'conf-high':confPct>=60?'conf-med':'conf-low';
    return '<div class="scrd '+cls+'"><div class="scrd-t" style="display:flex;justify-content:space-between;align-items:flex-start">'+a.title+mab2+manTag+'<span class="conf-badge '+confCls+'" style="flex-shrink:0;margin-left:8px">'+confPct+'%</span></div>'+
      '<div class="scrd-m">'+a.authors+'</div>'+
      '<div class="scrd-j">'+a.journal+' ('+a.year+') '+(a.pmid?'PMID:'+a.pmid:'')+' '+a.source+' '+acc+'</div>'+
      '<div class="scrd-a">'+hlPICO(a.abstract.substring(0,350)+(a.abstract.length>350?'...':''))+'</div>'+
      (a.aiR?'<div class="scrd-r">AI: '+a.aiR+'</div>':'')+
      '<div class="scrd-btns"><button class="sb sb-i '+(a.status==='included'?'on':'')+'" onclick="msSetSt(\''+a.id+'\',\'included\')">Include</button><button class="sb sb-e '+(a.status==='excluded'?'on':'')+'" onclick="msSetSt(\''+a.id+'\',\'excluded\')">Exclude</button><button class="sb sb-m '+(a.status==='maybe'?'on':'')+'" onclick="msSetSt(\''+a.id+'\',\'maybe\')">Maybe</button></div></div>';
  }).join('');
  msUpdN();
}
function msSetSt(id,st){var a=D.uniq.find(function(x){return x.id===id});if(a){a.status=st;a.manualOverride=true;manRenderScr(msCurF())}}
function msCurF(){var t=document.querySelector('#msStabs .tab.on');if(!t)return 'all';var x=t.textContent.toLowerCase();return x.indexOf('included')>=0?'si':x.indexOf('excluded')>=0?'se':x.indexOf('maybe')>=0?'sm':x.indexOf('pending')>=0?'p':'all'}
function msFScr(f,btn){document.querySelectorAll('#msStabs .tab').forEach(function(t){t.classList.remove('on')});btn.classList.add('on');manRenderScr(f)}
function msUpdN(){var a=D.uniq;document.getElementById('ms_ni').textContent=a.filter(function(x){return x.status==='included'}).length;document.getElementById('ms_ne').textContent=a.filter(function(x){return x.status==='excluded'}).length;document.getElementById('ms_nm').textContent=a.filter(function(x){return x.status==='maybe'}).length;document.getElementById('ms_np').textContent=a.filter(function(x){return x.status==='pending'}).length}
function msBulkScreen(status){D.uniq.forEach(function(a){if(a.status==='pending'){a.status=status;a.manualOverride=true}});manRenderScr(msCurF());ntf('All pending set to '+status,'success')}
async function manAiScr(){
  var pend=D.uniq.filter(function(a){return a.status==='pending'});
  if(!pend.length){ntf('No pending articles','info');return}
  document.getElementById('msS3P').style.display='block';document.getElementById('msAsB').disabled=true;
  for(var i=0;i<pend.length;i+=5){
    var batch=pend.slice(i,i+5);
    document.getElementById('msS3T').textContent='Screening '+(i+1)+'-'+Math.min(i+5,pend.length)+' of '+pend.length;
    document.getElementById('msS3B').style.width=Math.round((i+5)/pend.length*100)+'%';
    var batchMap={};var txt=batch.map(function(a,j){batchMap[j+1]=a;return 'ARTICLE '+(j+1)+':\nTitle: '+a.title+'\nAbstract: '+a.abstract.substring(0,500)}).join('\n---\n');
    try{
      var r=await AI('Screen for SLR.\nPICO: P='+D.pico.P+', I='+D.pico.I+', C='+(D.pico.C||'Any')+', O='+D.pico.O+'\n\nFor EACH: ARTICLE N: INCLUDE|EXCLUDE|MAYBE | Reason\n\n'+txt,'SLR screening expert.',4096);
      r.split('\n').forEach(function(line){
        var m=line.match(/ARTICLE\s*(\d+)\s*[:\.]\s*(INCLUDE|EXCLUDE|MAYBE)\s*[|:–-]\s*(.*)/i)||line.match(/(\d+)\s*[:\.]\s*(INCLUDE|EXCLUDE|MAYBE)\s*[|:–-]\s*(.*)/i);
        if(m){var art=batchMap[parseInt(m[1])];if(art&&art.status==='pending'){art.status=m[2].toUpperCase()==='INCLUDE'?'included':m[2].toUpperCase()==='EXCLUDE'?'excluded':'maybe';art.aiR=m[3]?m[3].trim():''}}
      });
    }catch(e){batch.forEach(function(a){if(a.status!=='pending')return;var t=(a.title+' '+a.abstract).toLowerCase();var pM=D.pico.P.toLowerCase().split(/\s+/).some(function(w){return w.length>3&&t.indexOf(w)>=0});var iM=D.pico.I.toLowerCase().split(/\s+/).some(function(w){return w.length>3&&t.indexOf(w)>=0});a.status=(pM&&iM)?'included':(pM||iM)?'maybe':'excluded';a.aiR='Keyword heuristic'})}
    manRenderScr();await new Promise(function(r){setTimeout(r,200)});
  }
  document.getElementById('msS3P').style.display='none';document.getElementById('msAsB').disabled=false;
  D.pc.scrExcl=D.uniq.filter(function(a){return a.status==='excluded'}).length;
  ntf('Screening complete!','success');
}

/* ===== STEP 5: Appraisal ===== */
function manToAppr(){
  D.screened=D.uniq.filter(function(a){return a.status==='included'||a.status==='maybe'});
  if(!D.screened.length){ntf('Include articles first','error');return}
  D.pc.fullText=D.screened.length;mDone(3);
  var isCER=D.rtype.indexOf('cer')===0||['pmcf','pms','sscp'].indexOf(D.rtype)>=0;
  if(!isCER&&document.getElementById('msThAuto').value==='yes'){
    D.screened.forEach(function(a){a.appraisal={ocebm:'N/A',daprTotal:12,decision:'pass'}});msRenderAppr();
  }
}
function manPassAll(){D.screened.forEach(function(a){if(!a.appraisal)a.appraisal={};a.appraisal.decision='pass'});msRenderAppr();ntf('All passed','success')}
async function manRunAppr(){
  if(!D.screened.length){ntf('No articles','error');return}
  document.getElementById('msS4P').style.display='block';
  var isCER=D.rtype.indexOf('cer')===0||['pmcf','pms','sscp'].indexOf(D.rtype)>=0;
  var txt=D.screened.map(function(a,i){return(i+1)+'. '+a.title+' ('+a.year+')'}).join('\n');
  try{
    var r=await AI('Appraise for '+(isCER?'CER (EU MDR). OCEBM 2011, DAPR (D/A/P/R each 0-3, /12), TOFSC. Classify Pivotal/Supportive.':'SLR.')+'\n\nArticles:\n'+txt+'\n\nReturn JSON array:\n[{"idx":0,"ocebm":"1b","daprTotal":10,"tofsc":"Adequate","classification":"Pivotal"}]\nONLY JSON.','EU MDR CER expert.',8192);
    var d=parseJSON(r);
    if(!d||!Array.isArray(d)){d=[];ntf('Invalid format, using defaults','error')}
    var thO=parseInt(document.getElementById('msThOcebm').value);var thD=parseInt(document.getElementById('msThDapr').value);
    d.forEach(function(ap){var a=D.screened[ap.idx];if(!a)return;var oN=parseInt(ap.ocebm)||5;var dapr=ap.daprTotal||0;var dec='pass';if(isCER){if(oN>thO||dapr<thD)dec='fail';else if(oN===thO||dapr===thD)dec='review'}a.appraisal=ap;a.appraisal.decision=dec});
    D.screened.forEach(function(a){if(!a.appraisal)a.appraisal={ocebm:'N/A',daprTotal:12,decision:isCER?'review':'pass'}});
    msRenderAppr();ntf('Appraisal done!','success');
  }catch(e){
    D.screened.forEach(function(a){a.appraisal={ocebm:['2b','3b','4','1b'][~~(Math.random()*4)],daprTotal:4+~~(Math.random()*8),classification:Math.random()>.4?'Pivotal':'Supportive',decision:Math.random()>.3?'pass':'review'}});
    msRenderAppr();ntf('Defaults applied','error');
  }
  document.getElementById('msS4P').style.display='none';
}
function msRenderAppr(){
  var isCER=D.rtype.indexOf('cer')===0||['pmcf','pms','sscp'].indexOf(D.rtype)>=0;
  document.getElementById('msApBody').innerHTML=D.screened.map(function(a,i){
    var ap=a.appraisal||{};var dc=ap.decision==='pass'?'ap-pass':ap.decision==='fail'?'ap-fail':'ap-review';
    return '<tr><td><strong>'+esc(a.title.substring(0,45))+'...</strong></td><td>'+(isCER?esc(ap.ocebm||'-'):'N/A')+'</td><td>'+(isCER?(ap.daprTotal||0)+'/12':'N/A')+'</td><td style="font-size:9px">'+(isCER?esc(ap.tofsc||'-'):'N/A')+'</td><td>'+esc(ap.classification||'-')+'</td><td><span class="'+dc+'">'+(ap.decision==='pass'?'PASS':ap.decision==='fail'?'FAIL':'REVIEW')+'</span></td><td><button class="btn bsm '+(ap.decision==='pass'?'bs':'bp')+'" onclick="msTogAp('+i+')">'+(ap.decision==='pass'?'Reject':'Force Pass')+'</button></td></tr>';
  }).join('');
  document.getElementById('ms_ap').textContent=D.screened.filter(function(a){return a.appraisal&&a.appraisal.decision==='pass'}).length;
  document.getElementById('ms_ar').textContent=D.screened.filter(function(a){return a.appraisal&&a.appraisal.decision==='review'}).length;
  document.getElementById('ms_af').textContent=D.screened.filter(function(a){return a.appraisal&&a.appraisal.decision==='fail'}).length;
}
function msTogAp(i){var a=D.screened[i];if(!a||!a.appraisal)return;a.appraisal.decision=a.appraisal.decision==='pass'?'fail':'pass';msRenderAppr()}
function manToExtract(){
  D.appraised=D.screened.filter(function(a){return a.appraisal&&(a.appraisal.decision==='pass'||a.appraisal.decision==='review')});
  if(!D.appraised.length){ntf('No articles passed appraisal','error');return}
  D.pc.apprPassed=D.appraised.length;D.pc.apprFailed=D.screened.length-D.appraised.length;mDone(4);
}

/* ===== STEP 6: Extraction ===== */
function msSwExt(tab,btn){
  document.querySelectorAll('#msExtTabs .tab').forEach(function(t){t.classList.remove('on')});btn.classList.add('on');
  document.getElementById('ms_ext_data').classList.toggle('on',tab==='data');
  document.getElementById('ms_ext_pdf').classList.toggle('on',tab==='pdf');
  if(tab==='pdf'){document.getElementById('msPdfPanel').innerHTML=renderPdfLibrary()}
}
function manRecalcSE(){D.extracted.forEach(function(d){d.se=calcSE(d.ciLower,d.ciUpper)});msRenderExtTbl(D.extracted);ntf('SE recalculated','success')}
async function manRunExtract(){
  if(!D.appraised.length){ntf('No articles to extract','error');return}
  document.getElementById('msS5P').style.display='block';document.getElementById('msS5B').style.width='20%';
  var txt=D.appraised.slice(0,15).map(function(a,i){return 'STUDY '+(i+1)+':\nTitle:'+a.title+'\nAuthors:'+a.authors+'\nYear:'+a.year+'\nAbstract:'+(a.abstract||'').substring(0,500)}).join('\n---\n');
  try{
    document.getElementById('msS5B').style.width='50%';
    var r=await AI('Extract data for meta-analysis. P:'+D.pico.P+',I:'+D.pico.I+',C:'+(D.pico.C||'Control')+',O:'+D.pico.O+'.\nse must be positive > 0. Calculate from CI: se=(ciUpper-ciLower)/(2*1.96).\nReturn JSON array:\n[{"articleId":"A0","study":"Author","arm":"Main","year":"2024","design":"RCT","n":100,"intervention":"drug","comparator":"placebo","outcome":"measure","effectSize":-0.5,"effectType":"SMD","ciLower":-0.8,"ciUpper":-0.2,"pValue":"0.001","se":0.15}]\nONLY valid JSON.\n\n'+txt,'SLR extraction expert. Numeric se>0 mandatory.',8192);
    document.getElementById('msS5B').style.width='80%';
    var d=parseJSON(r);if(!d||!Array.isArray(d)||!d.length)throw new Error('bad');
    d.forEach(function(row){row.effectSize=parseFloat(row.effectSize)||0;row.ciLower=parseFloat(row.ciLower)||(row.effectSize-0.5);row.ciUpper=parseFloat(row.ciUpper)||(row.effectSize+0.5);row.n=parseInt(row.n)||50;var se=parseFloat(row.se);if(!se||se<=0||isNaN(se))row.se=calcSE(row.ciLower,row.ciUpper);else row.se=+se.toFixed(4);if(!row.se||row.se<=0)row.se=0.15});
    D.extracted=d;
    // PDF source-locked enrichment
    var pdfIds=Object.keys(PDFMgr.files);
    if(pdfIds.length>0){var allPdfText=pdfIds.map(function(id){return PDFMgr.files[id].text||''}).join('\n\n');if(allPdfText.length>100){var pdfEx=extractFromPdfText(allPdfText);if(pdfEx&&Object.keys(pdfEx).length>0){d.forEach(function(row){if(!row._pdfLock)row._pdfLock={};if(pdfEx.n&&(!row.n||row.n<10)){row.n=pdfEx.n.val;row._pdfLock.n={conf:pdfEx.n.conf,src:pdfEx.n.src}}if(pdfEx.hr&&row.effectType==='HR'){row.effectSize=pdfEx.hr.val;row.ciLower=pdfEx.hr.lo;row.ciUpper=pdfEx.hr.hi;row.se=calcSE(pdfEx.hr.lo,pdfEx.hr.hi);row._pdfLock.hr={conf:pdfEx.hr.conf,src:pdfEx.hr.src}}})}}}
    D.pc.uniqueStudies=(new Set(d.map(function(x){return x.articleId||x.study}))).size;D.pc.dataRows=d.length;
    document.getElementById('msS5B').style.width='100%';msRenderExtTbl(d);ntf('Extracted: '+D.pc.uniqueStudies+' articles, '+d.length+' rows','success');
  }catch(e){
    D.extracted=D.appraised.slice(0,10).map(function(a,i){var eff=+(Math.random()*2-1).toFixed(2);var se=+(.1+Math.random()*.3).toFixed(2);return{articleId:'A'+i,study:(a.authors.split(',')[0]||'Author'+i).trim(),arm:'Main',year:a.year,design:'RCT',n:50+~~(Math.random()*400),intervention:D.pico.I,comparator:D.pico.C||'Placebo',outcome:D.pico.O,effectSize:eff,effectType:'SMD',ciLower:+(eff-1.96*se).toFixed(2),ciUpper:+(eff+1.96*se).toFixed(2),pValue:(Math.random()*.1).toFixed(3),se:se}});
    D.pc.uniqueStudies=D.extracted.length;D.pc.dataRows=D.extracted.length;msRenderExtTbl(D.extracted);ntf('Template generated — edit cells','error');
  }
  document.getElementById('msS5P').style.display='none';
}
function msRenderExtTbl(d){
  document.getElementById('msExBody').innerHTML=d.map(function(r,idx){
    var multi=d.filter(function(x){return(x.articleId||x.study)===(r.articleId||r.study)}).length>1;
    return '<tr><td><strong>'+esc(r.study)+'</strong>'+(multi?'<span class="mab">Multi-arm</span>':'')+'</td><td>'+esc(r.arm||'Main')+'</td><td>'+esc(r.year)+'</td><td>'+esc(r.design)+'</td><td><input class="inline-edit" type="number" value="'+r.n+'" onchange="msEditExt('+idx+',\'n\',this.value)"></td><td style="font-size:10px">'+esc(r.intervention)+'</td><td style="font-size:10px">'+esc(r.comparator)+'</td><td style="font-size:10px">'+esc(r.outcome)+'</td><td><input class="inline-edit" type="number" step="0.01" value="'+r.effectSize+'" onchange="msEditExt('+idx+',\'effectSize\',this.value)"> <span style="font-size:9px;color:var(--t3)">'+(r.effectType||'SMD')+'</span></td><td><input class="inline-edit" type="number" step="0.01" value="'+r.ciLower+'" onchange="msEditExt('+idx+',\'ciLower\',this.value)" style="width:55px"> , <input class="inline-edit" type="number" step="0.01" value="'+r.ciUpper+'" onchange="msEditExt('+idx+',\'ciUpper\',this.value)" style="width:55px"></td><td><input class="inline-edit" type="text" value="'+r.pValue+'" onchange="msEditExt('+idx+',\'pValue\',this.value)" style="width:55px"></td><td><input class="inline-edit" type="number" step="0.001" value="'+(r.se||'')+'" onchange="msEditExt('+idx+',\'se\',this.value)" style="width:60px;'+((!r.se||r.se<=0)?'border-color:var(--ro)':'')+'"></td><td><button class="del-btn" onclick="msDelExt('+idx+')">x</button></td></tr>'
  }).join('');
}
function msEditExt(idx,field,val){if(idx<0||idx>=D.extracted.length)return;if(['effectSize','ciLower','ciUpper','se','n'].indexOf(field)>=0)D.extracted[idx][field]=parseFloat(val)||0;else D.extracted[idx][field]=val;if(field==='ciLower'||field==='ciUpper'){D.extracted[idx].se=calcSE(D.extracted[idx].ciLower,D.extracted[idx].ciUpper);msRenderExtTbl(D.extracted)}}
function msDelExt(idx){D.extracted.splice(idx,1);D.pc.dataRows=D.extracted.length;msRenderExtTbl(D.extracted);ntf('Row deleted','info')}
function manAddRow(){
  D.extracted.push({articleId:'M'+Date.now(),study:'New Study',arm:'Main',year:'2024',design:'RCT',n:0,intervention:D.pico.I,comparator:D.pico.C||'Control',outcome:D.pico.O,effectSize:0,effectType:'SMD',ciLower:0,ciUpper:0,pValue:'',se:0.15});
  D.pc.dataRows=D.extracted.length;msRenderExtTbl(D.extracted);ntf('Row added','success');
}
function manToQual(){if(!D.extracted.length){ntf('Extract data first','error');return}ensureSE();mDone(5)}

/* ===== STEP 7: Quality ===== */
function msSwQ(t,b){document.querySelectorAll('#msQTabs .tab').forEach(function(x){x.classList.remove('on')});b.classList.add('on');document.getElementById('ms_q_rob').classList.toggle('on',t==='rob');document.getElementById('ms_q_grade').classList.toggle('on',t==='grade')}
async function manRunQual(){
  if(!D.extracted.length){ntf('No data','error');return}
  document.getElementById('msS6P').style.display='block';
  var sTxt=D.extracted.map(function(d,i){return(i+1)+'.'+d.study+'('+d.year+'),'+d.design}).join('; ');
  try{
    var r=await AI('RoB2+GRADE for '+D.pico.I+' in '+D.pico.P+'.\nStudies: '+sTxt+'\nReturn JSON:\n{"rob":[{"study":"Author(2024)","randomization":"Low","deviations":"Low","missingData":"Low","measurement":"Low","selection":"Low","overall":"Low"}],"grade":[{"outcome":"'+esc(D.pico.O)+'","studies":'+D.extracted.length+',"riskOfBias":"Serious","inconsistency":"Not serious","indirectness":"Not serious","imprecision":"Serious","publicationBias":"Undetected","certainty":"Low"}]}\nONLY JSON.','Cochrane RoB2 GRADE expert.',8192);
    var d=parseJSON(r);if(d&&d.rob){D.rob=d.rob;D.grade=d.grade||[]}else throw new Error('bad');
    msRRoB(D.rob);msRGR(D.grade);ntf('Quality done!','success');
  }catch(e){
    var rl=['Low','Some concerns','High'];
    D.rob=D.extracted.map(function(d){return{study:d.study+'('+d.year+')',randomization:rl[~~(Math.random()*3)],deviations:rl[~~(Math.random()*3)],missingData:rl[~~(Math.random()*2)],measurement:rl[~~(Math.random()*2)],selection:rl[~~(Math.random()*3)],overall:rl[~~(Math.random()*3)]}});
    D.grade=[{outcome:D.pico.O,studies:D.extracted.length,riskOfBias:'Serious',inconsistency:'Not serious',indirectness:'Not serious',imprecision:'Serious',publicationBias:'Undetected',certainty:'Low'}];
    msRRoB(D.rob);msRGR(D.grade);ntf('Defaults applied','error');
  }
  document.getElementById('msS6P').style.display='none';
}
function msRC2(v){var l=(v||'').toLowerCase();return l.indexOf('low')>=0?'rl':l.indexOf('high')>=0?'rh':'rm'}
function msRRoB(d){document.getElementById('msRobB').innerHTML=d.map(function(r,idx){return '<tr><td><strong>'+r.study+'</strong></td>'+['randomization','deviations','missingData','measurement','selection','overall'].map(function(k){return '<td><span class="rb '+msRC2(r[k])+'">'+r[k]+'</span></td>'}).join('')+'<td><button class="btn bsm bs" onclick="msEditRob('+idx+')">Edit</button></td></tr>'}).join('')}
function msEditRob(idx){
  var r=D.rob[idx];var fields=['randomization','deviations','missingData','measurement','selection','overall'];
  var opts='<option>Low</option><option>Some concerns</option><option>High</option>';
  openModal('<h2>Edit RoB: '+r.study+'</h2>'+fields.map(function(f){return '<div class="fg"><label class="fl">'+f+'</label><select id="msrob_'+f+'">'+opts+'</select></div>'}).join('')+'<div class="bg2"><button class="btn bp" onclick="msSaveRob('+idx+')">Save</button><button class="btn bs" onclick="closeModal()">Cancel</button></div>');
  setTimeout(function(){fields.forEach(function(f){document.getElementById('msrob_'+f).value=r[f]||'Low'})},50);
}
function msSaveRob(idx){['randomization','deviations','missingData','measurement','selection','overall'].forEach(function(f){D.rob[idx][f]=document.getElementById('msrob_'+f).value});msRRoB(D.rob);closeModal();ntf('RoB updated','success')}
function msRGR(d){document.getElementById('msGrB').innerHTML=d.map(function(g){return '<tr><td><strong>'+g.outcome+'</strong></td><td>'+g.studies+'</td><td>'+g.riskOfBias+'</td><td>'+g.inconsistency+'</td><td>'+g.indirectness+'</td><td>'+g.imprecision+'</td><td>'+g.publicationBias+'</td><td><span class="rb '+(g.certainty==='High'?'rl':g.certainty==='Moderate'?'rm':'rh')+'">'+g.certainty+'</span></td></tr>'}).join('')}

/* ===== STEP 8: Meta-Analysis ===== */
function manRunMeta(){
  ensureSE();var method=document.getElementById('msMM').value;
  runMetaAnalysis(method);
  if(!D.meta){ntf('Need 2+ studies with valid Effect Size and SE','error');return}
  document.getElementById('ms_me').textContent=D.meta.pe.toFixed(3);
  document.getElementById('ms_mc').textContent='['+D.meta.ciLo.toFixed(3)+', '+D.meta.ciHi.toFixed(3)+']';
  document.getElementById('ms_mi').textContent=D.meta.I2.toFixed(1)+'%';
  document.getElementById('ms_mt').textContent=D.meta.tau2.toFixed(4);
  document.getElementById('ms_mq').textContent=D.meta.Qp.toFixed(4);
  document.getElementById('ms_mp').textContent='['+D.meta.predLo.toFixed(2)+', '+D.meta.predHi.toFixed(2)+']';
  document.getElementById('msForest').innerHTML=genForestPlot();
  document.getElementById('msFunnel').innerHTML=genFunnelPlot();
  ntf('Meta-analysis complete! '+D.meta.studies.length+' studies pooled.','success');
}

/* ===== STEP 9: Report ===== */
function msSwR(t,b){document.querySelectorAll('#msRTabs .tab').forEach(function(x){x.classList.remove('on')});b.classList.add('on');document.getElementById('ms_r_prisma').classList.toggle('on',t==='prisma');document.getElementById('ms_r_report').classList.toggle('on',t==='report');document.getElementById('ms_r_export').classList.toggle('on',t==='export')}
async function manGenRep(){
  document.getElementById('msS8P').style.display='block';D.rout=document.getElementById('msFRT').value;
  try{await autoReport();document.getElementById('msRC').innerHTML=D.report;ntf('Report generated!','success')}catch(e){ntf(e.message,'error')}
  document.getElementById('msS8P').style.display='none';
  document.getElementById('msPrismaPlt').innerHTML=genPRISMA();
}

/* ===== INIT ===== */
function init(){
  lC();build();
  // After autopilot, allow switching to manual to review
  window.switchToManualReview=function(){
    D.mode='manual';D.step=0;D.done=new Set();
    document.getElementById('autoResults').style.display='none';
    document.getElementById('inputSection').style.display='none';
    document.getElementById('manualModules').style.display='block';
    document.getElementById('M').classList.add('manual-mode');
    buildManualSteps();buildPipe();goStep(0);
  };
}
document.addEventListener('DOMContentLoaded',init);
</script>
