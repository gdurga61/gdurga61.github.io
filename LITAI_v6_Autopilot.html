<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LITAI v6.5 — Unified CER/SLR Platform + PDF Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'}</script>
<style>
:root{--bg:#060a12;--bg2:#0e1525;--bgc:#141e33;--bgi:#0a1020;--bdr:#1e2d48;--t1:#e2e8f4;--t2:#7e90ad;--t3:#4e5f7a;--bl:#3b82f6;--cy:#06b6d4;--em:#10b981;--vi:#8b5cf6;--am:#f59e0b;--ro:#f43f5e;--or:#f97316;--gp:linear-gradient(135deg,#3b82f6,#06b6d4);--ga:linear-gradient(135deg,#8b5cf6,#06b6d4);--ge:linear-gradient(135deg,#10b981,#06b6d4);--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

.hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(6,10,18,.94);backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}.logo-i{width:34px;height:34px;background:var(--gp);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;letter-spacing:-0.5px}.logo-t{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;background:var(--gp);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.logo-v{font-size:10px;color:var(--cy);font-weight:600;background:rgba(6,182,212,.1);padding:2px 8px;border-radius:10px}
.hdr-r{display:flex;align-items:center;gap:10px}.api-s{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t3)}.api-d{width:7px;height:7px;border-radius:50%;background:var(--em);box-shadow:0 0 8px rgba(16,185,129,.6)}.api-d.off{background:var(--ro);box-shadow:0 0 8px rgba(244,63,94,.4)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .25s}.bp{background:var(--gp);color:#fff;box-shadow:0 4px 16px rgba(59,130,246,.3)}.bp:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(59,130,246,.4)}.bs{background:var(--bgc);color:var(--t1);border:1px solid var(--bdr)}.bs:hover{border-color:var(--bl)}.bac{background:var(--ga);color:#fff}.bgo{background:var(--ge);color:#fff;box-shadow:0 4px 16px rgba(16,185,129,.3)}.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}.bsm{padding:6px 12px;font-size:11px}.blg{padding:14px 32px;font-size:15px;border-radius:10px}
.bg2{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}

.fg{margin-bottom:14px}.fl{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
input[type="text"],input[type="number"],input[type="password"],input[type="email"],textarea,select{width:100%;background:var(--bgi);border:1px solid var(--bdr);border-radius:var(--rs);padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t1);outline:none;transition:.3s}input:focus,textarea:focus,select:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(59,130,246,.1)}textarea{resize:vertical;min-height:60px;line-height:1.5}

.card{background:var(--bgc);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;margin-bottom:16px}.ct{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}

.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}.sc{background:var(--bgc);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;text-align:center}.sv{font-size:24px;font-weight:700;background:var(--gp);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:3px}

.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr)}.dt{width:100%;border-collapse:collapse;font-size:11px}.dt th{text-align:left;padding:8px 10px;background:var(--bg2);border-bottom:2px solid var(--bdr);font-weight:600;color:var(--t2);text-transform:uppercase;font-size:9px;letter-spacing:.5px}.dt td{padding:8px 10px;border-bottom:1px solid var(--bdr);vertical-align:top}.dt tr:hover td{background:rgba(59,130,246,.03)}.mono{font-family:'DM Mono',monospace}
.inline-edit{background:var(--bgi);border:1px solid var(--bdr);border-radius:4px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--t1);width:68px;outline:none}.inline-edit:focus{border-color:var(--bl)}
.del-btn{background:none;border:none;color:var(--ro);cursor:pointer;font-size:14px;padding:2px 6px;opacity:.5;transition:.2s}.del-btn:hover{opacity:1}

.scrd{background:var(--bgc);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:8px;transition:.3s}.scrd.si{border-left:4px solid var(--em)}.scrd.se{border-left:4px solid var(--ro);opacity:.6}.scrd.sm{border-left:4px solid var(--am)}.scrd-t{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.3}.scrd-m{font-size:10px;color:var(--t3);margin-bottom:3px}.scrd-j{font-size:10px;color:var(--cy);margin-bottom:6px}.scrd-a{font-size:11px;color:var(--t2);line-height:1.5;margin-bottom:8px}.scrd-r{font-size:10px;color:var(--t3);font-style:italic;margin-top:4px}.scrd-btns{display:flex;gap:5px;flex-wrap:wrap}
.hl-p{background:rgba(59,130,246,.2);padding:0 2px;border-radius:2px}.hl-i{background:rgba(16,185,129,.2);padding:0 2px;border-radius:2px}.hl-c{background:rgba(139,92,246,.2);padding:0 2px;border-radius:2px}.hl-o{background:rgba(245,158,11,.2);padding:0 2px;border-radius:2px}
.sb{padding:4px 10px;border-radius:5px;border:1px solid;font-size:10px;font-weight:600;cursor:pointer;background:transparent;transition:.2s}.sb-i{border-color:var(--em);color:var(--em)}.sb-i:hover,.sb-i.on{background:var(--em);color:#fff}.sb-e{border-color:var(--ro);color:var(--ro)}.sb-e:hover,.sb-e.on{background:var(--ro);color:#fff}.sb-m{border-color:var(--am);color:var(--am)}.sb-m:hover,.sb-m.on{background:var(--am);color:#fff}
.abg{display:inline-flex;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:600;margin-left:6px}.af{background:rgba(16,185,129,.12);color:var(--em)}.ap2{background:rgba(244,63,94,.12);color:var(--ro)}
.mab{display:inline-flex;padding:1px 6px;border-radius:8px;font-size:8px;font-weight:700;background:rgba(139,92,246,.12);color:var(--vi);margin-left:4px}
.ap-pass{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:var(--rs);padding:3px 10px;font-size:10px;font-weight:600;color:var(--em)}.ap-fail{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);border-radius:var(--rs);padding:3px 10px;font-size:10px;font-weight:600;color:var(--ro)}.ap-review{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:var(--rs);padding:3px 10px;font-size:10px;font-weight:600;color:var(--am)}
.rb{display:inline-block;padding:2px 7px;border-radius:8px;font-size:9px;font-weight:600}.rl{background:rgba(16,185,129,.12);color:var(--em)}.rm{background:rgba(245,158,11,.12);color:var(--am)}.rh{background:rgba(244,63,94,.12);color:var(--ro)}

.tabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:16px;gap:1px;overflow-x:auto}.tab{padding:7px 14px;border:none;background:none;color:var(--t3);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:.3s;white-space:nowrap}.tab.on{color:var(--bl);border-bottom-color:var(--bl)}.tc{display:none}.tc.on{display:block}

.pb{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin:8px 0}.pf{height:100%;background:var(--gp);border-radius:2px;transition:width .6s ease}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--bdr);border-top-color:var(--bl);border-radius:50%;animation:sp .7s linear infinite}
.aip{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:var(--r);margin:10px 0;font-size:11px;color:var(--bl)}
@keyframes sp{to{transform:rotate(360deg)}}@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.plt{background:#fff;border-radius:var(--r);padding:18px;margin:10px 0;overflow-x:auto}
.rp{background:#fff;color:#1a1a1a;border-radius:var(--r);padding:36px;max-height:600px;overflow-y:auto;font-size:12px;line-height:1.7}.rp h1{font-size:20px;color:#111;margin-bottom:10px;font-family:'Playfair Display',serif}.rp h2{font-size:15px;color:#222;margin:18px 0 8px;border-bottom:2px solid #eee;padding-bottom:5px}.rp h3{font-size:13px;color:#333;margin:14px 0 6px}.rp p{margin-bottom:9px;color:#333}.rp ul,.rp ol{margin:8px 0 8px 20px;color:#333}.rp li{margin-bottom:4px}.rp table{width:100%;border-collapse:collapse;margin:12px 0;font-size:10px}.rp table th,.rp table td{border:1px solid #ddd;padding:5px 8px;text-align:left}.rp table th{background:#f5f5f5;font-weight:600}
.cb{background:var(--bgi);border:1px solid var(--bdr);border-radius:var(--rs);padding:12px;font-family:'DM Mono',monospace;font-size:11px;overflow-x:auto;white-space:pre-wrap;color:var(--cy);line-height:1.5}
.eg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}.ec{background:var(--bgc);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;text-align:center;cursor:pointer;transition:.3s}.ec:hover{border-color:var(--bl);transform:translateY(-2px)}.ei{font-size:28px;margin-bottom:6px}

.cfg{position:fixed;top:56px;right:0;width:360px;height:calc(100vh - 56px);background:var(--bg2);border-left:1px solid var(--bdr);z-index:98;transform:translateX(100%);transition:transform .3s;padding:20px;overflow-y:auto}.cfg.open{transform:translateX(0)}

.ntf{position:fixed;bottom:20px;right:20px;padding:10px 20px;border-radius:var(--r);font-size:12px;z-index:300;animation:su .3s ease;display:flex;align-items:center;gap:8px;box-shadow:0 20px 60px rgba(0,0,0,.5);max-width:400px}.ntf.ok{background:var(--em);color:#fff}.ntf.er{background:var(--ro);color:#fff}.ntf.in{background:var(--bl);color:#fff}@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center}.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:24px;max-width:800px;width:95%;max-height:85vh;overflow-y:auto}.modal h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:16px}

.auto-dash{background:var(--bgc);border:1px solid var(--bdr);border-radius:16px;padding:24px;margin-bottom:20px}
.auto-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.auto-steps{display:flex;flex-direction:column;gap:4px}
.auto-step{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--rs);transition:all .3s;font-size:12px;position:relative}
.auto-step.running{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2)}
.auto-step.done{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.15)}
.auto-step.error{background:rgba(244,63,94,.05);border:1px solid rgba(244,63,94,.15)}
.auto-step.pending{opacity:.4}
.as-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;border:2px solid var(--bdr);background:var(--bg)}
.auto-step.done .as-icon{background:var(--em);border-color:var(--em);color:#fff}
.auto-step.running .as-icon{background:transparent;border-color:var(--bl);color:var(--bl)}
.auto-step.error .as-icon{background:var(--ro);border-color:var(--ro);color:#fff}
.as-name{font-weight:600;flex:1}.as-stat{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace}.as-dur{font-size:9px;color:var(--t3);min-width:50px;text-align:right}
.auto-step.running .as-name{color:var(--bl)}.auto-step.done .as-name{color:var(--em)}.auto-step.error .as-name{color:var(--ro)}
.auto-total{margin-top:16px;padding-top:14px;border-top:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600}

.pico-g{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}.pico-c{background:var(--bgc);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;text-align:center}.pico-l{font-family:'Playfair Display',serif;font-size:38px;font-weight:800;margin-bottom:2px}.pico-lb{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.db-tg{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}.dbt{display:flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--bdr);border-radius:var(--rs);cursor:pointer;transition:.2s;font-size:11px;user-select:none}.dbt.on{border-color:var(--bl);background:rgba(59,130,246,.08);color:var(--bl)}
.thresh-box{background:var(--bgi);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:14px}.thresh-title{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--am)}

.mode-toggle{display:flex;background:var(--bgi);border:1px solid var(--bdr);border-radius:10px;padding:3px;margin-bottom:20px;width:fit-content}
.mode-btn{padding:8px 20px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .3s;background:transparent;color:var(--t3)}
.mode-btn.on{background:var(--gp);color:#fff;box-shadow:0 2px 12px rgba(59,130,246,.3)}

.pipe{position:fixed;top:56px;left:0;right:0;z-index:99;background:var(--bg2);border-bottom:1px solid var(--bdr);padding:6px 12px;display:none;align-items:center;gap:1px;overflow-x:auto}
.pipe.show{display:flex}
.ps{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:14px;font-size:10px;font-weight:500;color:var(--t3);cursor:pointer;transition:.3s;white-space:nowrap}.ps.on{background:rgba(59,130,246,.15);color:var(--bl)}.ps.done{color:var(--em)}.ps .sn{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;border:1.5px solid currentColor}.ps.done .sn{background:var(--em);border-color:var(--em);color:#fff}.ps.on .sn{background:var(--bl);border-color:var(--bl);color:#fff}.pa{color:var(--t3);font-size:10px;opacity:.3}

.main{margin-top:72px;padding:20px;max-width:1400px;margin-left:auto;margin-right:auto}
.main.manual-mode{margin-top:100px}
.mod{display:none;animation:fi .4s ease}.mod.on{display:block}
.warn-box{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:var(--r);padding:12px;margin:10px 0;font-size:11px;color:var(--am)}
.pleg{display:flex;gap:10px;margin:6px 0;font-size:10px;flex-wrap:wrap}.pleg span{display:flex;align-items:center;gap:3px}.pleg .d{width:10px;height:10px;border-radius:2px}

.cer-section{background:var(--bgi);border:1px solid var(--bdr);border-radius:var(--rs);padding:14px;margin-bottom:10px}
.cer-section h4{font-size:12px;font-weight:600;color:var(--cy);margin-bottom:8px}
.score-bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin:4px 0}.score-fill{height:100%;border-radius:3px;transition:width .4s}
.score-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.score-pass{background:rgba(16,185,129,.12);color:var(--em)}.score-review{background:rgba(245,158,11,.12);color:var(--am)}.score-fail{background:rgba(244,63,94,.12);color:var(--ro)}
.class-pivotal{color:var(--em);font-weight:700}.class-supportive{color:var(--bl);font-weight:600}.class-background{color:var(--t3);font-weight:500}

/* ============ PDF VIEWER (Rayyan-style) ============ */
.pdf-layout{display:grid;grid-template-columns:240px 1fr 280px;gap:0;height:600px;background:var(--bg);border-radius:var(--r);overflow:hidden;border:1px solid var(--bdr);margin:10px 0}
.pdf-list{background:var(--bg2);border-right:1px solid var(--bdr);overflow-y:auto;padding:10px}
.pdf-list-h{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.pdf-item{padding:9px 10px;border-radius:var(--rs);cursor:pointer;margin-bottom:4px;transition:.15s;background:var(--bgc);border:1px solid var(--bdr)}
.pdf-item:hover{border-color:var(--bl)}
.pdf-item.on{border-color:var(--bl);background:rgba(59,130,246,.08)}
.pdf-item-t{font-size:10px;font-weight:600;color:var(--t1);line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pdf-item-m{font-size:8px;color:var(--t3);font-family:'DM Mono',monospace;display:flex;justify-content:space-between}
.pdf-viewer{background:var(--bgi);overflow-y:auto;padding:14px;position:relative}
.pdf-page{position:relative;margin:0 auto 14px;background:#fff;box-shadow:0 8px 32px rgba(0,0,0,.5);border-radius:3px;overflow:hidden;width:fit-content}
.pdf-page canvas{display:block}
.pdf-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.pdf-hl{position:absolute;mix-blend-mode:multiply;border-radius:2px;cursor:pointer;pointer-events:auto;transition:.15s}
.pdf-hl.hl-p{background:rgba(59,130,246,.4)}
.pdf-hl.hl-i{background:rgba(16,185,129,.4)}
.pdf-hl.hl-c{background:rgba(139,92,246,.4)}
.pdf-hl.hl-o{background:rgba(245,158,11,.4)}
.pdf-hl.hl-num{background:rgba(244,63,94,.45);outline:1px dashed rgba(244,63,94,.6)}
.pdf-hl:hover{filter:brightness(1.3);transform:scale(1.03)}
.pdf-side{background:var(--bg2);border-left:1px solid var(--bdr);overflow-y:auto;padding:12px}
.pdf-side h4{font-size:10px;color:var(--t1);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:8px}
.pdf-match{padding:7px 9px;background:var(--bgc);border:1px solid var(--bdr);border-radius:6px;margin-bottom:5px;cursor:pointer;font-size:9px;line-height:1.4;color:var(--t2);transition:.15s}
.pdf-match:hover{border-color:var(--bl);color:var(--t1)}
.pdf-match .pg{font-family:'DM Mono',monospace;font-size:8px;color:var(--cy);margin-bottom:2px}
.pdf-drop{border:2px dashed var(--bdr);border-radius:var(--r);padding:32px;text-align:center;cursor:pointer;transition:.2s;color:var(--t3)}
.pdf-drop:hover{border-color:var(--bl);background:rgba(59,130,246,.03)}
.pdf-drop.dragover{border-color:var(--bl);background:rgba(59,130,246,.06)}
.pdf-tbar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:5;font-size:10px;color:var(--t2)}
.pdf-tbar button{background:var(--bgc);border:1px solid var(--bdr);color:var(--t2);width:24px;height:24px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.pdf-tbar button:hover{border-color:var(--bl);color:var(--t1)}
/* Source-lock badges */
.conf-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;font-family:'DM Mono',monospace}
.conf-high{background:rgba(16,185,129,.1);color:var(--em)}
.conf-med{background:rgba(245,158,11,.1);color:var(--am)}
.conf-low{background:rgba(244,63,94,.1);color:var(--ro)}

<script>
/* ===================================================================
   LITAI v6.0 — UNIFIED CER/SLR PLATFORM
   Full pipeline: PICO > Search > Dedup > Screen > Appraise > Extract > Quality > Meta > Report
   =================================================================== */

/* ===== GLOBAL STATE ===== */
let D = {

let _uid=0;
function uid(){return 'U'+(++_uid)}

/* ===== SETTINGS ===== */
function sC(){
  localStorage.setItem('lk',document.getElementById('apiK').value);
  localStorage.setItem('le',document.getElementById('pmE').value);

/* ===== NOTIFICATION ===== */
function ntf(m,t){
  t=t||'in';
  var n=document.createElement('div');
  n.className='ntf '+(t==='success'?'ok':t==='error'?'er':'in');
  n.textContent=m;
  document.body.appendChild(n);
  setTimeout(function(){n.remove()},4000);
}

/* ===== AI CALL ===== */
async function AI(p,s,maxTok){
  s=s||'';
  var k=localStorage.getItem('lk');
  if(!k) throw new Error('Set API key in Settings first');
  var mt=maxTok||parseInt(localStorage.getItem('lt'))||8192;
  var b={model:localStorage.getItem('lm')||'claude-sonnet-4-20250514',max_tokens:mt,messages:[{role:'user',content:p}]};
  if(s)b.system=s;
  var r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(b)
  });
  if(!r.ok){var e={};try{e=await r.json()}catch(_){}throw new Error((e.error&&e.error.message)||('API error '+r.status))}
  var data=await r.json();
  return data.content.map(function(bl){return bl.text||''}).join('');
}
async function tAPI(){
  try{var r=await AI('Reply exactly: OK','',256);ntf(r.includes('OK')?'Connected!':'Response received','success');document.getElementById('apiD').classList.remove('off');document.getElementById('apiT').textContent='Connected'}
  catch(e){ntf(e.message,'error');document.getElementById('apiD').classList.add('off')}
}

/* ===== ROBUST JSON PARSER ===== */
function parseJSON(raw){
  if(!raw)return null;
  try{return JSON.parse(raw)}catch(_){}
  var c=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
  try{return JSON.parse(c)}catch(_){}
  var m=c.match(/\[[\s\S]*\]/);if(m){try{return JSON.parse(m[0])}catch(_){}}
  var m2=c.match(/\{[\s\S]*\}/);if(m2){try{var p=JSON.parse(m2[0]);return p}catch(_){}}
  // Try fixing common issues
  try{var fixed=c.replace(/,\s*([}\]])/g,'$1').replace(/([{,])\s*(\w+)\s*:/g,'$1"$2":').replace(/'/g,'"');return JSON.parse(fixed)}catch(_){}
  return null;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function openModal(h){document.getElementById('modalContent').innerHTML=h;document.getElementById('modalOv').classList.add('open')}
function closeModal(){document.getElementById('modalOv').classList.remove('open')}
function calcSE(lo,hi){lo=parseFloat(lo);hi=parseFloat(hi);if(isNaN(lo)||isNaN(hi)||lo>=hi)return 0;return+((hi-lo)/(2*1.96)).toFixed(4)}
function ensureSE(){D.extracted.forEach(function(d){var se=parseFloat(d.se);if(!se||se<=0||isNaN(se)){d.se=calcSE(d.ciLower,d.ciUpper);if(!d.se||d.se<=0)d.se=0.15}})}

/* ===== PICO HIGHLIGHTING ===== */
function hlPICO(text){
  if(!text)return '';
  var h=esc(text);
  var words=[];
  function addW(s,cls){if(!s)return;s.split(/[\s,;]+/).forEach(function(w){if(w.length>3)words.push({w:w,cls:cls})})}
  addW(D.pico.P,'hl-p');addW(D.pico.I,'hl-i');addW(D.pico.C,'hl-c');addW(D.pico.O,'hl-o');
  words.sort(function(a,b){return b.w.length-a.w.length});
  words.forEach(function(item){
    var re=new RegExp('('+item.w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    h=h.replace(re,'<span class="'+item.cls+'">$1</span>');
  });
  return h;
}

/* ===== OCEBM SCORING ===== */
function ocebmToNumeric(level){
  var map={'1a':10,'1b':9,'1c':8,'2a':8,'2b':7,'2c':6,'3a':6,'3b':5,'4':3,'5':1};
  return map[String(level).toLowerCase()]||5;
}
function ocebmFromDesign(design){
  if(!design)return '4';
  var d=design.toLowerCase();
  if(d.indexOf('meta')>=0||d.indexOf('systematic')>=0)return '1a';
  if(d.indexOf('rct')>=0||d.indexOf('randomiz')>=0||d.indexOf('randomis')>=0)return '1b';
  if(d.indexOf('cohort')>=0)return '2b';
  if(d.indexOf('case-control')>=0||d.indexOf('case control')>=0)return '3b';
  if(d.indexOf('case series')>=0||d.indexOf('case report')>=0)return '4';
  if(d.indexOf('cross-section')>=0||d.indexOf('cross section')>=0)return '4';
  if(d.indexOf('expert')>=0||d.indexOf('opinion')>=0||d.indexOf('editorial')>=0)return '5';
  if(d.indexOf('observational')>=0)return '2b';
  return '4';
}

/* ===== COMPOSITE SCORE CALCULATION ===== */
function calcCompositeScore(ap){
  if(!ap)return 0;
  var ocebmNum=ocebmToNumeric(ap.ocebm||'4');
  var design=(ap.design||'').toLowerCase();
  var isRCT=design.indexOf('rct')>=0||design.indexOf('randomiz')>=0||design.indexOf('randomis')>=0;
  var isObs=design.indexOf('cohort')>=0||design.indexOf('case')>=0||design.indexOf('observational')>=0;
  var jadad=parseInt(ap.jadad)||0;
  var nos=parseInt(ap.nos)||0;
  var daprTotal=parseInt(ap.daprTotal)||0;
  if(isRCT){
    return Math.round((ocebmNum/10)*30+(jadad/5)*40+(daprTotal/12)*30);
  } else if(isObs){
    return Math.round((ocebmNum/10)*30+(nos/9)*40+(daprTotal/12)*30);
  } else {
    return Math.round((ocebmNum/10)*40+(daprTotal/12)*60);
  }
}
function scoreDecision(score,threshold){
  threshold=threshold||D.threshold||40;
  if(score>=threshold+10)return 'pass';
  if(score>=threshold-10)return 'review';
  return 'fail';
}
function scoreClassification(score){
  if(score>=70)return 'Pivotal';
  if(score>=40)return 'Supportive';
  return 'Background';
}

/* ===== ARTICLE FACTORY ===== */
function mkA(o){
  return {
    id:o.pmid||o.nctId||uid(),title:o.title||'Untitled',abstract:o.abstract||'',
    authors:o.authors||'',journal:o.journal||'',year:o.year||'2024',
    pmid:o.pmid||'',doi:o.doi||'',nctId:o.nctId||'',source:o.source||'',
    isFree:!!o.isFree,status:'pending',aiR:'',arms:1,
    appraisal:null
  };
}
function fbA(src,n){
  var a=[];for(var i=0;i<n;i++){
    var designs=['RCT','Cohort','Case-control','Observational','Cross-sectional'];
    a.push(mkA({title:['Efficacy','Safety','Outcomes','Effectiveness','Tolerability'][i%5]+' of '+D.pico.I+' in '+D.pico.P+' ('+src+' #'+(i+1)+')',abstract:'Study evaluating '+D.pico.I+' vs '+(D.pico.C||'control')+' in '+D.pico.P+'. Primary outcome: '+D.pico.O+'. This '+designs[i%5]+' study enrolled '+(50+i*30)+' participants and measured outcomes over '+(6+i*3)+' months.',authors:'Author'+(i+1)+' et al.',journal:src+' Journal',year:''+(2018+i%7),source:src,isFree:Math.random()>.4}));
  }
  return a;
}

/* ===== DATABASE SEARCH FUNCTIONS ===== */
async function sPM(em){
  try{
    var q=D.pmq||D.pico.P+' AND '+D.pico.I;
    var url='https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term='+encodeURIComponent(q)+'&retmax=40&retmode=json';
    if(em)url+='&email='+encodeURIComponent(em);
    if(D.dateFrom)url+='&mindate='+D.dateFrom+'&maxdate='+(D.dateTo||'2026')+'&datetype=pdat';
    var r=await(await fetch(url)).json();
    var ids=(r.esearchresult&&r.esearchresult.idlist)?r.esearchresult.idlist:[];
    if(!ids.length)return fbA('PubMed',12);
    return await fPM(ids,em);
  }catch(e){return fbA('PubMed',12)}
}
async function fPM(ids,em){
  var r=await(await fetch('https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=pubmed&id='+ids.join(',')+'&retmode=xml&email='+encodeURIComponent(em||'litai@example.com'))).text();
  var x=new DOMParser().parseFromString(r,'text/xml');
  return Array.from(x.querySelectorAll('PubmedArticle')).map(function(a){
    var ti=a.querySelector('ArticleTitle');
    var ab=Array.from(a.querySelectorAll('AbstractText')).map(function(t){return t.textContent}).join(' ');
    var au=Array.from(a.querySelectorAll('Author')).map(function(a2){var ln=a2.querySelector('LastName');var ini=a2.querySelector('Initials');return(ln?ln.textContent:'')+(ini?' '+ini.textContent:'')}).filter(Boolean);
    var yrEl=a.querySelector('PubDate Year');
    var yr=yrEl?yrEl.textContent:'2024';
    return mkA({title:ti?ti.textContent:'Untitled',abstract:ab||'No abstract available.',authors:au.slice(0,4).join(', ')+(au.length>4?' et al.':''),journal:(a.querySelector('ISOAbbreviation')||{}).textContent||'',year:yr,pmid:(a.querySelector('PMID')||{}).textContent||'',doi:(a.querySelector('ArticleId[IdType="doi"]')||{}).textContent||'',source:'PubMed',isFree:!!a.querySelector('ArticleId[IdType="pmc"]')});
  });
}
async function sCO(em){
  try{
    var q=D.pico.P+' '+D.pico.I+' systematic review';
    var url='https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term='+encodeURIComponent(q)+'&retmax=15&retmode=json';
    if(em)url+='&email='+encodeURIComponent(em);
    var r=await(await fetch(url)).json();
    var ids=(r.esearchresult&&r.esearchresult.idlist)?r.esearchresult.idlist:[];
    if(!ids.length)return fbA('Cochrane',4);
    var a=await fPM(ids,em);
    return a.map(function(x){x.source='Cochrane';x.id=uid();return x});
  }catch(e){return fbA('Cochrane',4)}
}
async function sCT(){
  try{
    var r=await(await fetch('https://clinicaltrials.gov/api/v2/studies?query.term='+encodeURIComponent(D.pico.P+' '+D.pico.I)+'&pageSize=15&format=json')).json();
    return(r.studies||[]).map(function(s){
      var p=s.protocolSection||{};var id=p.identificationModule||{};var ds=p.descriptionModule||{};var st=p.statusModule||{};
      return mkA({title:id.officialTitle||id.briefTitle||'Clinical Trial',abstract:ds.briefSummary||'No description available.',authors:(id.organization||{}).fullName||'',journal:'ClinicalTrials.gov',year:((st.startDateStruct||{}).date||'2024').substring(0,4),nctId:id.nctId||'',source:'ClinicalTrials.gov',isFree:true});
    });
  }catch(e){return fbA('ClinicalTrials.gov',4)}
}
async function sSS(){
  try{
    var r=await(await fetch('https://api.semanticscholar.org/graph/v1/paper/search?query='+encodeURIComponent(D.pico.P+' '+D.pico.I+' '+D.pico.O)+'&limit=15&fields=title,abstract,authors,year,externalIds,journal,isOpenAccess')).json();
    return(r.data||[]).map(function(p){
      return mkA({title:p.title||'',abstract:p.abstract||'',authors:(p.authors||[]).map(function(a){return a.name}).slice(0,4).join(', '),journal:(p.journal||{}).name||'',year:''+(p.year||2024),pmid:(p.externalIds||{}).PubMed||'',doi:(p.externalIds||{}).DOI||'',source:'Semantic Scholar',isFree:p.isOpenAccess||false});
    });
  }catch(e){return fbA('Semantic Scholar',6)}
}

/* ===== DEDUPLICATION ===== */
function autoDedup(){
  var seen=new Map(),dups=[],uni=[],ma=0;
  D.arts.forEach(function(a){
    var k=a.doi||a.pmid||a.title.toLowerCase().replace(/[^a-z0-9]/g,'').substring(0,80);
    if(k&&seen.has(k)){var o=seen.get(k);o.arms++;if(o.arms===2)ma++;dups.push({o:o,d:a})}
    else{seen.set(k,a);uni.push(a)}
  });
  D.uniq=uni;D.dups=dups;
  D.pc.identified=D.arts.length;D.pc.dupsRem=dups.length;D.pc.screened=uni.length;D.pc.multiArm=ma;
}

/* ===== AI SCREENING ===== */
async function autoScreen(){
  var bs=8;
  for(var i=0;i<D.uniq.length;i+=bs){
    var batch=D.uniq.slice(i,i+bs);
    var batchMap={};
    var txt=batch.map(function(a,j){batchMap[j+1]=a;return 'ARTICLE '+(j+1)+':\nTitle: '+a.title+'\nAbstract: '+(a.abstract||'').substring(0,400)}).join('\n---\n');
    try{
      var r=await AI('Screen articles for systematic review.\nPICO: P='+D.pico.P+', I='+D.pico.I+', C='+(D.pico.C||'Any')+', O='+D.pico.O+'\n\nFor EACH article, output exactly one line:\nARTICLE N: INCLUDE/EXCLUDE/MAYBE | Reason\n\n'+txt,'SLR screening expert. One line per article. Be specific in reasoning.',4096);
      r.split('\n').forEach(function(line){
        var patterns=[/ARTICLE\s*(\d+)\s*[:\.]\s*(INCLUDE|EXCLUDE|MAYBE)/i,/(\d+)\s*[:\.]\s*(INCLUDE|EXCLUDE|MAYBE)/i,/^\s*[-*]\s*(?:Article\s*)?(\d+)\s*[:\.]\s*(INCLUDE|EXCLUDE|MAYBE)/i];
        for(var pi=0;pi<patterns.length;pi++){
          var m=line.match(patterns[pi]);
          if(m){var art=batchMap[parseInt(m[1])];if(art&&art.status==='pending'){art.status=m[2].toUpperCase()==='INCLUDE'?'included':m[2].toUpperCase()==='EXCLUDE'?'excluded':'maybe';var rm=line.match(/(?:INCLUDE|EXCLUDE|MAYBE)\s*[|:\u2013-]\s*(.*)/i);art.aiR=rm?rm[1].trim():'AI screened'}break}
        }
      });
    }catch(e){}
    batch.forEach(function(a){
      if(a.status!=='pending')return;
      var t=(a.title+' '+a.abstract).toLowerCase();
      var pM=D.pico.P.toLowerCase().split(/\s+/).some(function(w){return w.length>3&&t.indexOf(w)>=0});
      var iM=D.pico.I.toLowerCase().split(/\s+/).some(function(w){return w.length>3&&t.indexOf(w)>=0});
      a.status=(pM&&iM)?'included':(pM||iM)?'maybe':'excluded';
      if(!a.aiR)a.aiR='Keyword heuristic fallback';
    });
  }
}

/* ===== PDF MANAGER — Real PDF.js + Rayyan-style PICO highlighting ===== */
const PDFMgr={
  files:{},doc:null,pages:[],textContent:[],matches:[],scale:1.3,
  async load(file){
    if(typeof pdfjsLib==='undefined'){ntf('PDF.js not loaded','error');return null}
    var ab=await file.arrayBuffer();
    var doc=await pdfjsLib.getDocument({data:ab}).promise;
    this.doc=doc;this.pages=[];this.textContent=[];
    for(var i=1;i<=doc.numPages;i++){
      var pg=await doc.getPage(i);
      this.pages.push(pg);
      this.textContent.push(await pg.getTextContent());
    }
    return doc;
  },
  async renderTo(container,terms){
    if(!this.doc)return;
    container.innerHTML='';this.matches=[];
    for(var i=0;i<this.pages.length;i++){
      var pg=this.pages[i];
      var vp=pg.getViewport({scale:this.scale});
      var wrap=document.createElement('div');wrap.className='pdf-page';
      wrap.style.width=vp.width+'px';wrap.style.height=vp.height+'px';
      var cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
      wrap.appendChild(cv);
      var ov=document.createElement('div');ov.className='pdf-overlay';
      wrap.appendChild(ov);container.appendChild(wrap);
      await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
      this.highlightPage(i,ov,vp,terms);
    }
  },
  highlightPage(pageIdx,overlay,viewport,terms){
    var tc=this.textContent[pageIdx];if(!tc)return;
    var self=this;
    tc.items.forEach(function(item){
      var text=item.str.toLowerCase();
      Object.keys(terms).forEach(function(cat){
        terms[cat].forEach(function(term){
          if(!term||term.length<3)return;
          var lt=term.toLowerCase(),idx=text.indexOf(lt);
          while(idx!==-1){
            var tx=item.transform,x=tx[4],y=tx[5],fh=Math.abs(tx[0])||10;
            var cw=item.width/item.str.length;
            var xo=idx*cw,mw=lt.length*cw;
            var vr=viewport.convertToViewportRectangle([x+xo,y,x+xo+mw,y+fh]);
            var left=Math.min(vr[0],vr[2]),top=Math.min(vr[1],vr[3]);
            var w=Math.abs(vr[2]-vr[0]),h=Math.abs(vr[3]-vr[1]);
            var hl=document.createElement('div');
            hl.className='pdf-hl hl-'+cat;
            hl.style.cssText='left:'+left+'px;top:'+top+'px;width:'+w+'px;height:'+h+'px';
            hl.title=cat.toUpperCase()+': '+term;
            hl.dataset.page=pageIdx+1;hl.dataset.term=term;
            overlay.appendChild(hl);
            self.matches.push({page:pageIdx+1,term:term,cat:cat,context:item.str.substring(Math.max(0,idx-25),idx+lt.length+25)});
            idx=text.indexOf(lt,idx+1);
          }
        });
      });
      // Numeric highlights (statistics: HR, p-values, CIs, percentages)
      var numMatch=item.str.match(/\d+\.?\d*\s*%|\b\d+\.\d+\b\s*\(|HR\s*[=:]?\s*\d|p\s*[<=]\s*\d|95%\s*CI/i);
      if(numMatch){
        var tx2=item.transform,x2=tx2[4],y2=tx2[5],fh2=Math.abs(tx2[0])||10;
        var cw2=item.width/item.str.length;
        var xo2=numMatch.index*cw2,mw2=numMatch[0].length*cw2;
        var vr2=viewport.convertToViewportRectangle([x2+xo2,y2,x2+xo2+mw2,y2+fh2]);
        var hl2=document.createElement('div');hl2.className='pdf-hl hl-num';
        hl2.style.cssText='left:'+Math.min(vr2[0],vr2[2])+'px;top:'+Math.min(vr2[1],vr2[3])+'px;width:'+Math.abs(vr2[2]-vr2[0])+'px;height:'+Math.abs(vr2[3]-vr2[1])+'px';
        hl2.title='Numeric: '+numMatch[0];overlay.appendChild(hl2);
      }
    });
  },
  getFullText(){
    var txt='';
    this.textContent.forEach(function(tc){
      tc.items.forEach(function(item){txt+=item.str+' '});
      txt+='\n';
    });
    return txt;
  },
  reset(){this.doc=null;this.pages=[];this.textContent=[];this.matches=[]}
};

// Source-locked extraction from PDF text
function extractFromPdfText(text){
  var data={};
  var orrM=text.match(/(?:objective response(?:\s+rate)?|ORR)[^.]*?(\d+\.?\d*)\s*%/i);
  if(orrM)data.orr={val:parseFloat(orrM[1]),conf:0.93,src:orrM[0].substring(0,80)};
  var pfsM=text.match(/(?:median (?:progression.free survival|PFS))[^.]*?(\d+\.?\d*)\s*months?/i);
  if(pfsM)data.pfs={val:parseFloat(pfsM[1]),conf:0.95,src:pfsM[0].substring(0,80)};
  var osM=text.match(/(?:median (?:overall survival|OS))[^.]*?(\d+\.?\d*)\s*months?/i);
  if(osM)data.os={val:parseFloat(osM[1]),conf:0.94,src:osM[0].substring(0,80)};
  var nM=text.match(/(\d+)\s+(?:patients|participants|subjects)\s+(?:were\s+)?(?:enrolled|randomi[sz]ed|included)/i);
  if(nM)data.n={val:parseInt(nM[1]),conf:0.96,src:nM[0].substring(0,80)};
  var aeM=text.match(/grade\s*(?:≥|>=|3\+|3 or)\s*\d?[^.]*?(\d+\.?\d*)\s*%/i);
  if(aeM)data.ae={val:parseFloat(aeM[1]),conf:0.88,src:aeM[0].substring(0,80)};
  var hrM=text.match(/(?:hazard ratio|HR)\s*[=:,]?\s*(\d+\.?\d*)\s*(?:\(|,|\s).*?(\d+\.?\d*)\s*[-–to]+\s*(\d+\.?\d*)/i);
  if(hrM)data.hr={val:parseFloat(hrM[1]),lo:parseFloat(hrM[2]),hi:parseFloat(hrM[3]),conf:0.91,src:hrM[0].substring(0,80)};
  return data;
}

/* ===== CRITICAL APPRAISAL — FULL SCORING ===== */
async function autoAppraise(){
  if(!D.screened.length)return;
  // Initialize all with defaults
  D.screened.forEach(function(a){
    var design=guessDesign(a);
    a.appraisal={
      design:design,ocebm:ocebmFromDesign(design),
      jadad:0,jadadItems:{randMentioned:0,randAppropriate:0,blindMentioned:0,blindAppropriate:0,withdrawals:0},
      nos:0,nosItems:{selection:0,comparability:0,outcome:0},
      daprTotal:6,daprItems:{data:2,applicability:1,performance:2,relevance:1},
      tofsc:'',compositeScore:0,classification:'Background',decision:'review',manualOverride:false
    };
  });
  // AI appraisal
  try{
    var txt=D.screened.slice(0,15).map(function(a,i){return(i+1)+'. "'+a.title+'" ('+a.year+') | Design: '+(a.appraisal.design||'Unknown')+' | Abstract: '+(a.abstract||'').substring(0,300)}).join('\n');
    var r=await AI('You are a clinical evidence appraisal expert. Appraise these articles.\n\nFor EACH article, assess:\n1. OCEBM 2011 Level (1a,1b,2a,2b,3a,3b,4,5)\n2. Study design (RCT, Cohort, Case-control, Case series, etc.)\n3. If RCT: Jadad score components (randomization mentioned 0/1, randomization appropriate 0/1, blinding mentioned 0/1, blinding appropriate 0/1, withdrawals described 0/1)\n4. If Observational: NOS components (selection 0-4, comparability 0-2, outcome 0-3)\n5. DAPR scores (data 0-3, applicability 0-3, performance 0-3, relevance 0-3)\n6. TOFSC summary (one line)\n\nReturn ONLY valid JSON array:\n[{"idx":0,"ocebm":"2b","design":"RCT","jadad":3,"jadadItems":{"randMentioned":1,"randAppropriate":1,"blindMentioned":1,"blindAppropriate":0,"withdrawals":0},"nos":0,"nosItems":{"selection":0,"comparability":0,"outcome":0},"daprTotal":8,"daprItems":{"data":2,"applicability":2,"performance":2,"relevance":2},"tofsc":"RCT with adequate follow-up, relevant outcomes measured"}]\n\nArticles:\n'+txt,'Critical appraisal expert for systematic reviews and CERs. Return ONLY valid JSON.',8192);
    var d=parseJSON(r);
    if(d&&Array.isArray(d)){
      d.forEach(function(ap){
        var a=D.screened[ap.idx];
        if(!a)return;
        a.appraisal.ocebm=ap.ocebm||a.appraisal.ocebm;
        a.appraisal.design=ap.design||a.appraisal.design;
        if(ap.jadad!=null)a.appraisal.jadad=parseInt(ap.jadad)||0;
        if(ap.jadadItems)a.appraisal.jadadItems=ap.jadadItems;
        if(ap.nos!=null)a.appraisal.nos=parseInt(ap.nos)||0;
        if(ap.nosItems)a.appraisal.nosItems=ap.nosItems;
        if(ap.daprTotal!=null)a.appraisal.daprTotal=parseInt(ap.daprTotal)||6;
        if(ap.daprItems)a.appraisal.daprItems=ap.daprItems;
        if(ap.tofsc)a.appraisal.tofsc=ap.tofsc;
      });
    }
  }catch(e){}
  // Calculate composite scores
  D.screened.forEach(function(a){
    if(!a.appraisal)return;
    // Recalculate jadad from items
    if(a.appraisal.jadadItems){
      var ji=a.appraisal.jadadItems;
      a.appraisal.jadad=(ji.randMentioned||0)+(ji.randAppropriate||0)+(ji.blindMentioned||0)+(ji.blindAppropriate||0)+(ji.withdrawals||0);
    }
    if(a.appraisal.nosItems){
      var ni=a.appraisal.nosItems;
      a.appraisal.nos=(ni.selection||0)+(ni.comparability||0)+(ni.outcome||0);
    }
    if(a.appraisal.daprItems){
      var di=a.appraisal.daprItems;
      a.appraisal.daprTotal=(di.data||0)+(di.applicability||0)+(di.performance||0)+(di.relevance||0);
    }
    a.appraisal.compositeScore=calcCompositeScore(a.appraisal);
    a.appraisal.decision=scoreDecision(a.appraisal.compositeScore);
    a.appraisal.classification=scoreClassification(a.appraisal.compositeScore);
  });
}

function guessDesign(a){
  var t=(a.title+' '+a.abstract).toLowerCase();
  if(t.indexOf('randomized')>=0||t.indexOf('randomised')>=0||t.indexOf('rct')>=0)return 'RCT';
  if(t.indexOf('cohort')>=0)return 'Cohort';
  if(t.indexOf('case-control')>=0||t.indexOf('case control')>=0)return 'Case-control';
  if(t.indexOf('meta-analysis')>=0||t.indexOf('meta analysis')>=0)return 'Meta-analysis';
  if(t.indexOf('systematic review')>=0)return 'Systematic Review';
  if(t.indexOf('cross-sectional')>=0||t.indexOf('cross sectional')>=0)return 'Cross-sectional';
  if(t.indexOf('case series')>=0)return 'Case series';
  if(t.indexOf('case report')>=0)return 'Case report';
  if(t.indexOf('trial')>=0)return 'Clinical Trial';
  if(t.indexOf('observational')>=0)return 'Observational';
  return 'Other';
}

function gammaln(x){
  var c=[76.18009172947146,-86.50532032941677,24.01409824083091,-1.231739572450155,0.001208650973866179,-0.000005395239384953];
  var y=x,tmp=x+5.5;tmp-=(x+0.5)*Math.log(tmp);
  var ser=1.000000000190015;for(var j=0;j<6;j++)ser+=c[j]/(++y);
  return -tmp+Math.log(2.5066282746310005*ser/x);
}
function chi2cdf(x,k){
  if(x<=0||k<=0)return 0;
  var a=k/2,g=a;var sum=1/a,term=1/a;
  for(var n=1;n<200;n++){a++;term*=x/2/a;sum+=term;if(Math.abs(term)<1e-12)break}
  return sum*Math.exp(-x/2+(g)*Math.log(x/2)-gammaln(g));
}

function runMetaAnalysis(method){
  method=method||'DL';
  ensureSE();
  var data=D.extracted.filter(function(d){return d.effectSize!=null&&!isNaN(parseFloat(d.effectSize))&&parseFloat(d.se)>0});
  if(data.length<2)return null;

  // Check if binary outcome (OR/RR) -> use log-transform
  var isBinary=data.some(function(d){return d.effectType==='OR'||d.effectType==='RR'||d.effectType==='HR'});
  var st=data.map(function(d){
    var y=+d.effectSize,se=+d.se;
    if(isBinary&&y>0){y=Math.log(y);se=se/d.effectSize;if(se<=0||isNaN(se))se=0.15}
    return{nm:d.study+(d.year?' ('+d.year+')':'')+(d.arm&&d.arm!=='Main'?' ['+d.arm+']':''),y:y,se:se,origY:+d.effectSize,origSE:+d.se,w:0,wR:0,wp:0,n:d.n||50};
  });

  // Fixed-effect
  var W=0;st.forEach(function(s){s.w=1/(s.se*s.se);W+=s.w});
  var mu_f=st.reduce(function(a,s){return a+s.w*s.y},0)/W;

  // Q statistic
  var Q=st.reduce(function(a,s){return a+s.w*Math.pow(s.y-mu_f,2)},0);
  var df=st.length-1;
  var C=W-st.reduce(function(a,s){return a+s.w*s.w},0)/W;

  // DerSimonian-Laird tau^2
  var tau2=Math.max(0,(Q-df)/C);

  // Random-effects weights
  var WR=0;
  st.forEach(function(s){s.wR=1/(s.se*s.se+tau2);WR+=s.wR});
  var mu_re=st.reduce(function(a,s){return a+s.wR*s.y},0)/WR;
  var se_re=Math.sqrt(1/WR);

  // HKSJ correction
  var mu_hksj=mu_re;
  var qr=st.reduce(function(a,s){return a+s.wR*Math.pow(s.y-mu_re,2)},0);
  var hksjVar=(1/df)*qr*(1/WR);
  var se_hksj=Math.sqrt(hksjVar);

  var pe,sePE;
  if(method==='FE'){pe=mu_f;sePE=Math.sqrt(1/W)}
  else if(method==='HKSJ'){pe=mu_hksj;sePE=se_hksj}
  else{pe=mu_re;sePE=se_re}

  // Weights as percentages
  var totalW=0;
  st.forEach(function(s){s.wp=(method==='FE'?s.w:s.wR);totalW+=s.wp});
  st.forEach(function(s){s.wpPct=totalW>0?(s.wp/totalW*100):0});

  // I^2
  var I2=df>0?Math.max(0,(Q-df)/Q*100):0;

  // Q test p-value
  var Qp=1-chi2cdf(Q,df);

  // Prediction interval
  var predSE=Math.sqrt(sePE*sePE+tau2);
  var predLo=pe-1.96*predSE,predHi=pe+1.96*predSE;

  // Transform back if binary
  var displayPE=pe,displayCI_lo=pe-1.96*sePE,displayCI_hi=pe+1.96*sePE;
  if(isBinary){displayPE=Math.exp(pe);displayCI_lo=Math.exp(pe-1.96*sePE);displayCI_hi=Math.exp(pe+1.96*sePE);predLo=Math.exp(predLo);predHi=Math.exp(predHi);st.forEach(function(s){s.displayY=Math.exp(s.y);s.displayLo=Math.exp(s.y-1.96*s.se);s.displayHi=Math.exp(s.y+1.96*s.se)})}
  else{st.forEach(function(s){s.displayY=s.y;s.displayLo=s.y-1.96*s.se;s.displayHi=s.y+1.96*s.se})}

  // Leave-one-out
  var loo=st.map(function(excl,idx){
    var sub=st.filter(function(_,j){return j!==idx});
    var wT=0;sub.forEach(function(s){wT+=s.wR});
    var muLoo=sub.reduce(function(a,s){return a+s.wR*s.y},0)/wT;
    var seLoo=Math.sqrt(1/wT);
    return{excluded:excl.nm,pe:isBinary?Math.exp(muLoo):muLoo,ciLo:isBinary?Math.exp(muLoo-1.96*seLoo):(muLoo-1.96*seLoo),ciHi:isBinary?Math.exp(muLoo+1.96*seLoo):(muLoo+1.96*seLoo)};
  });

  // Egger's test (when >= 10 studies)
  var egger=null;
  if(st.length>=10){
    var n2=st.length;
    var xs=st.map(function(s){return 1/s.se});
    var ys=st.map(function(s){return s.y/s.se});
    var mx=xs.reduce(function(a,b){return a+b},0)/n2;
    var my=ys.reduce(function(a,b){return a+b},0)/n2;
    var num=0,den=0;
    for(var ii=0;ii<n2;ii++){num+=(xs[ii]-mx)*(ys[ii]-my);den+=(xs[ii]-mx)*(xs[ii]-mx)}
    var slope=den>0?num/den:0;
    var intercept=my-slope*mx;
    egger={intercept:+intercept.toFixed(3),slope:+slope.toFixed(3),biasLikely:Math.abs(intercept)>2};
  }

  D.meta={studies:st,pe:displayPE,ciLo:displayCI_lo,ciHi:displayCI_hi,I2:I2,tau2:tau2,Q:Q,Qp:Qp,df:df,predLo:predLo,predHi:predHi,method:method,isBinary:isBinary,loo:loo,egger:egger,sePE:sePE};
  return true;
}
function autoMeta(){return runMetaAnalysis('DL')}

/* ===== REPORT GENERATION ===== */
async function autoReport(){
  var rtype=D.rout||'prisma';
  if(rtype==='cer_sp'){await genCERReport();return}
  if(rtype==='cer_eq'){await genCEReqReport();return}
  // Default: PRISMA / other single-call reports
  await genStandardReport(rtype);
}

async function genCERReport(){
  var deviceInfo='Device: '+(D.device.name||'[Device]')+', Manufacturer: '+(D.device.manufacturer||'[Manufacturer]')+', Class: '+(D.device.classif||'[Class]')+', Purpose: '+(D.device.purpose||'[Purpose]')+', GMDN: '+(D.device.gmdn||'[GMDN]');
  var picoInfo='P: '+D.pico.P+', I: '+D.pico.I+', C: '+(D.pico.C||'N/A')+', O: '+D.pico.O;
  var prismaStats='Identified: '+(D.pc.identified||0)+', Screened: '+(D.pc.screened||0)+', Included: '+(D.pc.apprPassed||0)+', Excluded: '+(D.pc.apprFailed||0);
  var safeSum=D.safetyData.slice(0,5).map(function(s){return s.study+': AE '+s.totalAE_pct+'%, SAE '+s.sae_pct+'%'}).join('; ');
  var perfSum=D.perfData.slice(0,5).map(function(p){return p.study+': Success '+p.successRate+'%, Endpoint '+(p.endpointMet||'N/A')}).join('; ');
  var apprSum=D.screened.slice(0,8).map(function(a){return a.title.substring(0,40)+(a.appraisal?' ['+a.appraisal.compositeScore+'/100, '+a.appraisal.classification+']':'')}).join('; ');
  var metaSum=D.meta?('Pooled: '+D.meta.pe.toFixed(3)+' ['+D.meta.ciLo.toFixed(3)+', '+D.meta.ciHi.toFixed(3)+'], I2='+D.meta.I2.toFixed(1)+'%'):'No meta-analysis';
  var sections=[];
  var sysPrompt='You are an EU MDR MEDDEV 2.7/1 Rev 4 clinical evaluation report medical writer. Write formal, regulatory-grade content.';

  // Section 1: Device Description
  try{
    var s1=await AI('Write Section 1: Device Description and Intended Purpose for a Clinical Evaluation Report per MEDDEV 2.7/1 Rev 4.\n'+deviceInfo+'\nInclude: device description, intended purpose, indications, contraindications, mode of action, materials.\nWrite 2-4 paragraphs of professional CER content.',sysPrompt,4096);
    sections.push('<h2>1. Device Description and Intended Purpose</h2>'+s1);
  }catch(e){sections.push('<h2>1. Device Description and Intended Purpose</h2><p>'+deviceInfo+'</p>')}

  // Section 2: Clinical Background
  try{
    var s2=await AI('Write Section 2: Clinical Background and Current Knowledge / State of the Art for a CER.\n'+picoInfo+'\n'+deviceInfo+'\nCover: disease/condition background, current treatment landscape, state of art for this type of device, clinical guidelines.',sysPrompt,4096);
    sections.push('<h2>2. Clinical Background and State of the Art</h2>'+s2);
  }catch(e){sections.push('<h2>2. Clinical Background and State of the Art</h2><p>Clinical background for '+D.pico.P+' with '+D.pico.I+'.</p>')}

  // Section 3: Literature Search
  try{
    var s3=await AI('Write Section 3: Literature Search Strategy and Results for a CER.\nSearch details:\n- PICO: '+picoInfo+'\n- Databases: PubMed, Cochrane, ClinicalTrials.gov, Semantic Scholar\n- PRISMA counts: '+prismaStats+'\n- Search query used: '+esc(D.pmq||'')+'\nDescribe methodology, databases, search terms, screening process, PRISMA flow.',sysPrompt,4096);
    sections.push('<h2>3. Literature Search Strategy and Results</h2>'+s3);
  }catch(e){sections.push('<h2>3. Literature Search Strategy and Results</h2><p>'+prismaStats+'</p>')}

  // Section 4: Clinical Data Appraisal
  try{
    var s4=await AI('Write Section 4: Clinical Data Appraisal for a CER.\nAppraisal results:\n'+apprSum+'\nTools used: OCEBM 2011, Jadad (RCTs), Newcastle-Ottawa (observational), DAPR scoring, TOFSC assessment.\nThreshold: '+D.threshold+'/100 composite score.\nDescribe appraisal methodology and summarize quality of included evidence.',sysPrompt,4096);
    sections.push('<h2>4. Clinical Data Appraisal</h2>'+s4);
  }catch(e){sections.push('<h2>4. Clinical Data Appraisal</h2><p>'+apprSum+'</p>')}

  // Section 5: Safety Analysis
  try{
    var s5=await AI('Write Section 5: Analysis of Safety Data for a CER.\n'+deviceInfo+'\nSafety data summary:\n'+safeSum+'\nAnalyze: adverse events, serious adverse events, device-related AEs, malfunctions, benefit-risk considerations.',sysPrompt,4096);
    sections.push('<h2>5. Analysis of Safety Data</h2>'+s5);
  }catch(e){sections.push('<h2>5. Analysis of Safety Data</h2><p>'+safeSum+'</p>')}

  // Section 6: Performance Analysis
  try{
    var s6=await AI('Write Section 6: Analysis of Performance Data for a CER.\n'+deviceInfo+'\nPerformance data summary:\n'+perfSum+'\nMeta-analysis: '+metaSum+'\nAnalyze: clinical performance, endpoint achievement, effectiveness outcomes.',sysPrompt,4096);
    sections.push('<h2>6. Analysis of Performance Data</h2>'+s6);
  }catch(e){sections.push('<h2>6. Analysis of Performance Data</h2><p>'+perfSum+'</p>')}

  // Section 7: Benefit-Risk
  try{
    var s7=await AI('Write Section 7: Benefit-Risk Analysis for a CER.\n'+deviceInfo+'\nSafety summary: '+safeSum+'\nPerformance summary: '+perfSum+'\nProvide formal benefit-risk profile assessment per EU MDR requirements.',sysPrompt,4096);
    sections.push('<h2>7. Benefit-Risk Analysis</h2>'+s7);
  }catch(e){sections.push('<h2>7. Benefit-Risk Analysis</h2><p>Benefit-risk analysis to be completed.</p>')}

  // Section 8: Conclusions
  try{
    var s8=await AI('Write Section 8: Conclusions on Safety and Performance for a CER.\n'+deviceInfo+'\nSummarize overall conclusions on safety and performance based on the clinical evidence reviewed. Include post-market surveillance recommendations.',sysPrompt,4096);
    sections.push('<h2>8. Conclusions on Safety and Performance</h2>'+s8);
  }catch(e){sections.push('<h2>8. Conclusions on Safety and Performance</h2><p>Conclusions to be completed.</p>')}

  // Section 0: Executive Summary (generated last)
  try{
    var s0=await AI('Write the Executive Summary (Section 0) for a CER that has these sections:\n1. Device: '+deviceInfo+'\n2. PRISMA: '+prismaStats+'\n3. Safety: '+safeSum+'\n4. Performance: '+perfSum+'\n5. Meta: '+metaSum+'\nProvide a concise executive summary covering all key findings and conclusions.',sysPrompt,4096);
    sections.unshift('<h2>Executive Summary</h2>'+s0);
  }catch(e){sections.unshift('<h2>Executive Summary</h2><p>Executive summary of clinical evaluation for '+(D.device.name||D.pico.I)+'.</p>')}

  // Section 9: References
  var refs=D.appraised.slice(0,15).map(function(a,i){return '<p>'+(i+1)+'. '+esc(a.authors)+'. '+esc(a.title)+'. <em>'+esc(a.journal)+'</em>. '+esc(a.year)+'.'+(a.doi?' DOI: '+esc(a.doi):'')+(a.pmid?' PMID: '+esc(a.pmid):'')+'</p>'}).join('');
  sections.push('<h2>9. References</h2>'+refs);

  D.report='<h1>Clinical Evaluation Report</h1><p><em>Per MEDDEV 2.7/1 Rev 4 | EU MDR 2017/745</em></p><p>Device: '+(D.device.name||D.pico.I)+' | Date: '+new Date().toLocaleDateString()+'</p><hr>'+sections.join('<hr>');
  D.reportSections=sections;
}

async function genCEReqReport(){
  var deviceInfo='Device: '+(D.device.name||D.pico.I)+', Manufacturer: '+(D.device.manufacturer||'');
  try{
    var r=await AI('Write a CER Equivalence / State of the Art assessment.\nDevice: '+deviceInfo+'\nPICO: P='+D.pico.P+', I='+D.pico.I+'\nIncluded studies: '+D.appraised.length+'\nCover: clinical equivalence assessment (technical, biological, clinical characteristics), state of art analysis, gap analysis.','EU MDR CER equivalence assessment expert.',8192);
    D.report='<h1>CER: Equivalence and State of the Art Assessment</h1><p>Device: '+esc(D.device.name||D.pico.I)+' | Date: '+new Date().toLocaleDateString()+'</p><hr>'+r;
  }catch(e){D.report='<h1>CER Equivalence Assessment</h1><p>Report generation failed: '+esc(e.message)+'</p>'}
}

async function genStandardReport(rtype){
  var statsText='PRISMA: Identified='+D.pc.identified+', Duplicates='+D.pc.dupsRem+', Screened='+D.pc.screened+', Excluded='+D.pc.scrExcl+', Full-text='+D.pc.fullText+', Appraised='+D.pc.apprPassed+', Final='+D.extracted.length;
  var metaText=D.meta?('Pooled effect='+D.meta.pe.toFixed(3)+' ['+D.meta.ciLo.toFixed(3)+','+D.meta.ciHi.toFixed(3)+'], I2='+D.meta.I2.toFixed(1)+'%, tau2='+D.meta.tau2.toFixed(3)+', Q p='+D.meta.Qp.toFixed(4)):'No meta-analysis performed';
  var robText=D.rob.slice(0,5).map(function(r){return r.study+': '+r.overall}).join('; ');
  var gradeText=D.grade.map(function(g){return g.outcome+': '+g.certainty}).join('; ');

  var promptMap={
    'prisma':'Write a complete PRISMA 2020 systematic review report.',
    'csr':'Write a Clinical Study Report per ICH E3 guidelines.',
    'hta':'Write an HTA evidence review report.',
    'heor':'Write a HEOR / cost-effectiveness evidence review.',
    'pmcf':'Write a Post-Market Clinical Follow-up (PMCF) report.',
    'safety':'Write a Safety Signal Review report.',
    'exec':'Write a concise Executive Summary of the systematic review.'
  };
  var prompt=(promptMap[rtype]||'Write a systematic literature review report.')+'\n\nTopic: '+D.pico.I+' in '+D.pico.P+'\nOutcome: '+D.pico.O+'\n'+statsText+'\n'+metaText+'\nRoB: '+robText+'\nGRADE: '+gradeText+'\nStudies: '+D.extracted.slice(0,10).map(function(d){return d.study+' ('+d.year+'): ES='+d.effectSize}).join('; ');

  try{
    var r=await AI(prompt,'Expert systematic review medical writer. Include all standard sections with references.',8192);
    D.report='<h1>'+(rtype==='prisma'?'Systematic Literature Review (PRISMA 2020)':rtype==='csr'?'Clinical Study Report (ICH E3)':rtype==='hta'?'Health Technology Assessment Review':'Evidence Review')+'</h1><p>'+esc(D.pico.I)+' in '+esc(D.pico.P)+' | '+new Date().toLocaleDateString()+'</p><hr>'+r;
  }catch(e){
    D.report='<h1>Report</h1><p>Report generation encountered an error: '+esc(e.message)+'</p><p>'+statsText+'</p><p>'+metaText+'</p>';
  }
}

/* ===== FOREST PLOT (SVG) ===== */
function genForestPlot(){
  if(!D.meta||!D.meta.studies.length)return '<p>No meta-analysis data available.</p>';
  var st=D.meta.studies,pe=D.meta.pe,ciLo=D.meta.ciLo,ciHi=D.meta.ciHi;
  var isBin=D.meta.isBinary;
  var nullVal=isBin?1:0;

  // Calculate plot range
  var allVals=[];
  st.forEach(function(s){allVals.push(s.displayLo,s.displayHi)});
  allVals.push(ciLo,ciHi);
  var mn=Math.min.apply(null,allVals),mx=Math.max.apply(null,allVals);
  var pad=(mx-mn)*0.15||0.5;mn-=pad;mx+=pad;

  var rowH=24,topM=40,nameW=180,dataW=150,plotW=350,totalW=nameW+plotW+dataW+40;
  var h=topM+st.length*rowH+60;
  function xPos(v){return nameW+20+((v-mn)/(mx-mn))*plotW}

  var svg='<svg viewBox="0 0 '+totalW+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:'+totalW+'px">';
  svg+='<style>text{font-family:DM Sans,sans-serif;font-size:10px;fill:#333}.hd{font-weight:700;font-size:9px;fill:#666;text-transform:uppercase}</style>';

  // Headers
  svg+='<text x="10" y="20" class="hd">Study</text>';
  svg+='<text x="'+(nameW+20+plotW/2)+'" y="20" text-anchor="middle" class="hd">Effect Size</text>';
  svg+='<text x="'+(nameW+plotW+50)+'" y="20" class="hd">ES [95% CI]</text>';
  svg+='<text x="'+(totalW-30)+'" y="20" text-anchor="end" class="hd">Weight</text>';

  // Null line
  var nullX=xPos(nullVal);
  svg+='<line x1="'+nullX+'" y1="'+topM+'" x2="'+nullX+'" y2="'+(topM+st.length*rowH+10)+'" stroke="#999" stroke-dasharray="3,3" stroke-width="1"/>';

  // Studies
  st.forEach(function(s,i){
    var cy=topM+i*rowH+12;
    var xL=xPos(s.displayLo),xR=xPos(s.displayHi),xM=xPos(s.displayY);
    var r=Math.max(2,Math.min(6,Math.sqrt(s.wpPct)*1.2));

    svg+='<text x="10" y="'+(cy+3)+'" font-size="9">'+esc(s.nm.length>28?s.nm.substring(0,26)+'..':s.nm)+'</text>';
    svg+='<line x1="'+Math.max(nameW+20,xL)+'" y1="'+cy+'" x2="'+Math.min(nameW+20+plotW,xR)+'" y2="'+cy+'" stroke="#3b82f6" stroke-width="1.5"/>';
    svg+='<rect x="'+(xM-r)+'" y="'+(cy-r)+'" width="'+(r*2)+'" height="'+(r*2)+'" fill="#3b82f6" rx="1"/>';
    svg+='<text x="'+(nameW+plotW+50)+'" y="'+(cy+3)+'" font-family="DM Mono,monospace" font-size="9">'+s.displayY.toFixed(2)+' ['+s.displayLo.toFixed(2)+', '+s.displayHi.toFixed(2)+']</text>';
    svg+='<text x="'+(totalW-30)+'" y="'+(cy+3)+'" text-anchor="end" font-size="9">'+s.wpPct.toFixed(1)+'%</text>';
  });

  // Diamond for pooled
  var dy=topM+st.length*rowH+30;
  var dxM=xPos(pe),dxL=xPos(ciLo),dxR=xPos(ciHi);
  svg+='<polygon points="'+dxL+','+dy+' '+dxM+','+(dy-7)+' '+dxR+','+dy+' '+dxM+','+(dy+7)+'" fill="#ef4444" opacity="0.8"/>';
  svg+='<text x="10" y="'+(dy+4)+'" font-weight="700" font-size="10">Pooled ('+D.meta.method+')</text>';
  svg+='<text x="'+(nameW+plotW+50)+'" y="'+(dy+4)+'" font-family="DM Mono,monospace" font-size="9" font-weight="700">'+pe.toFixed(2)+' ['+ciLo.toFixed(2)+', '+ciHi.toFixed(2)+']</text>';
  svg+='</svg>';
  return svg;
}

/* ===== FUNNEL PLOT (SVG) ===== */
function genFunnelPlot(){
  if(!D.meta||!D.meta.studies.length)return '<p>No data.</p>';
  var st=D.meta.studies;
  var pe=D.meta.isBinary?Math.log(D.meta.pe):D.meta.pe;
  var w=500,h=380,pad=50;

  var allES=st.map(function(s){return s.y}),allSE=st.map(function(s){return s.se});
  var minES=Math.min.apply(null,allES),maxES=Math.max.apply(null,allES);
  var maxSE=Math.max.apply(null,allSE)*1.2;
  var esRange=maxES-minES||1;
  var esPad=esRange*0.3;minES-=esPad;maxES+=esPad;

  function xP(es){return pad+((es-minES)/(maxES-minES))*(w-2*pad)}
  function yP(se){return pad+((se)/maxSE)*(h-2*pad)}

  var svg='<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:500px">';
  svg+='<style>text{font-family:DM Sans,sans-serif;font-size:9px;fill:#666}</style>';

  // 95% CI triangle
  var topX=xP(pe),topY=yP(0);
  var botL=xP(pe-1.96*maxSE),botR=xP(pe+1.96*maxSE),botY=yP(maxSE);
  svg+='<polygon points="'+topX+','+topY+' '+botL+','+botY+' '+botR+','+botY+'" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.3)" stroke-dasharray="4,2"/>';

  // Axes
  svg+='<line x1="'+pad+'" y1="'+pad+'" x2="'+pad+'" y2="'+(h-pad)+'" stroke="#ccc"/>';
  svg+='<line x1="'+pad+'" y1="'+(h-pad)+'" x2="'+(w-pad)+'" y2="'+(h-pad)+'" stroke="#ccc"/>';

  // Pooled estimate line
  svg+='<line x1="'+topX+'" y1="'+pad+'" x2="'+topX+'" y2="'+(h-pad)+'" stroke="#ef4444" stroke-dasharray="3,3" stroke-width="0.8"/>';

  // Labels
  svg+='<text x="'+(w/2)+'" y="'+(h-8)+'" text-anchor="middle">Effect Size'+(D.meta.isBinary?' (log scale)':'')+'</text>';
  svg+='<text x="12" y="'+(h/2)+'" text-anchor="middle" transform="rotate(-90,12,'+(h/2)+')">Standard Error</text>';

  // Points
  st.forEach(function(s){
    var cx=xP(s.y),cy=yP(s.se);
    svg+='<circle cx="'+cx+'" cy="'+cy+'" r="4" fill="#3b82f6" opacity="0.7" stroke="#fff" stroke-width="0.5"/>';
  });

  // Axis ticks
  for(var i=0;i<=4;i++){
    var v=minES+(maxES-minES)*(i/4);
    var label=D.meta.isBinary?Math.exp(v).toFixed(2):v.toFixed(2);
    svg+='<text x="'+xP(v)+'" y="'+(h-pad+14)+'" text-anchor="middle">'+label+'</text>';
  }
  for(var j=0;j<=3;j++){
    var seV=maxSE*(j/3);
    svg+='<text x="'+(pad-6)+'" y="'+(yP(seV)+3)+'" text-anchor="end">'+seV.toFixed(2)+'</text>';
  }

  svg+='</svg>';
  return svg;
}

/* =================================================================
   AUTOPILOT ENGINE
   ================================================================= */
async function runAutoPilot(){
  readInputs();
  if(!D.pico.P||!D.pico.I||!D.pico.O){ntf('Fill Population, Intervention, and Outcome','error');return}
  if(!localStorage.getItem('lk')){ntf('Set API key in Settings first','error');return}
  D.autoRunning=true;
  document.getElementById('autoBtn').disabled=true;

  var dash=document.getElementById('autoDash');
  dash.style.display='block';
  dash.innerHTML='<div class="auto-dash"><div class="auto-title" id="autoTitle">Autopilot Running</div><div class="auto-steps" id="autoSteps">'+
    STEPS_META.map(function(s,i){return '<div class="auto-step pending" id="as_'+s.id+'"><div class="as-icon">'+(i+1)+'</div><div class="as-name">'+s.name+'</div><div class="as-stat" id="ast_'+s.id+'">Pending</div><div class="as-dur" id="asd_'+s.id+'"></div></div>'}).join('')+
    '</div><div class="auto-total"><span>Total Progress</span><div class="pb" style="width:300px"><div class="pf" id="autoProgress" style="width:0%"></div></div></div></div>';

  var startAll=Date.now(),progress=0;
  function markStep(id,status,stat){
    document.getElementById('as_'+id).className='auto-step '+status;
    if(stat)document.getElementById('ast_'+id).textContent=stat;
    if(status==='done'||status==='error'){
      var dur=((Date.now()-D.stepTimes[id])/1000).toFixed(1);
      document.getElementById('asd_'+id).textContent=dur+'s';
    }
    progress++;
    document.getElementById('autoProgress').style.width=Math.round(progress/STEPS_META.length*100)+'%';
  }
  function startStep(id){
    document.getElementById('as_'+id).className='auto-step running';
    document.getElementById('ast_'+id).innerHTML='<span class="spin" style="width:12px;height:12px;border-width:1.5px"></span> Processing...';
    D.stepTimes[id]=Date.now();
    progress--;
  }

  try{
    // Step 1: PICO + Strategy
    startStep('pico');
    var em=localStorage.getItem('le')||'litai@example.com';
    try{
      var strat=await AI('Generate a PubMed Boolean search strategy for a systematic review.\nP: '+D.pico.P+'\nI: '+D.pico.I+'\nC: '+(D.pico.C||'Any')+'\nO: '+D.pico.O+'\nDates: '+D.dateFrom+'-'+D.dateTo+'\n\nProvide the PubMed query inside <QUERY> tags, then a brief explanation of the strategy.','Expert medical librarian specializing in systematic review search strategies.',4096);
      D.strat=strat;
      var qm=strat.match(/<QUERY>([\s\S]*?)<\/QUERY>/);
      D.pmq=qm?qm[1].trim():(D.pico.P+' AND '+D.pico.I);
    }catch(e){D.pmq=D.pico.P+' AND '+D.pico.I}
    markStep('pico','done','PICO configured, strategy generated');

    // Step 2: Search
    startStep('search');
    var all=[];
    if(D.dbs.indexOf('pubmed')>=0){all=all.concat(await sPM(em))}
    if(D.dbs.indexOf('cochrane')>=0){all=all.concat(await sCO(em))}
    if(D.dbs.indexOf('ctgov')>=0){all=all.concat(await sCT())}
    if(D.dbs.indexOf('scholar')>=0){all=all.concat(await sSS())}
    D.arts=all;
    markStep('search','done',all.length+' records from '+D.dbs.length+' databases');

    // Step 3: Dedup
    startStep('dedup');
    autoDedup();
    markStep('dedup','done',D.uniq.length+' unique ('+D.dups.length+' dups removed)');

    // Step 4: Screening
    startStep('screen');
    await autoScreen();
    var inc=D.uniq.filter(function(a){return a.status==='included'}).length;
    var exc=D.uniq.filter(function(a){return a.status==='excluded'}).length;
    var may=D.uniq.filter(function(a){return a.status==='maybe'}).length;
    D.screened=D.uniq.filter(function(a){return a.status==='included'||a.status==='maybe'});
    D.pc.scrExcl=exc;D.pc.fullText=D.screened.length;
    markStep('screen','done',inc+' included, '+may+' maybe, '+exc+' excluded');

    // Step 5: Appraisal
    startStep('appraise');
    await autoAppraise();
    D.appraised=D.screened.filter(function(a){return a.appraisal&&(a.appraisal.decision==='pass'||a.appraisal.decision==='review')});
    D.pc.apprPassed=D.appraised.length;D.pc.apprFailed=D.screened.length-D.appraised.length;
    markStep('appraise','done',D.appraised.length+' passed / '+D.pc.apprFailed+' failed');

    // Step 6: Extraction
    startStep('extract');
    await autoExtract();
    D.pc.uniqueStudies=(new Set(D.extracted.map(function(x){return x.articleId||x.study}))).size;
    D.pc.dataRows=D.extracted.length;
    markStep('extract','done',D.extracted.length+' data rows extracted');

    // Step 7: Quality
    startStep('quality');
    await autoQuality();
    markStep('quality','done','RoB: '+D.rob.length+', GRADE: '+D.grade.length);

    // Step 8: Meta-Analysis
    startStep('meta');
    ensureSE();
    var metaOk=autoMeta();
    if(metaOk)markStep('meta','done','Pooled: '+D.meta.pe.toFixed(3)+', I2='+D.meta.I2.toFixed(1)+'%');
    else markStep('meta','error','< 2 valid studies for pooling');

    // Step 9: Report
    startStep('report');
    await autoReport();
    markStep('report','done','Report generated');

    var totalSec=((Date.now()-startAll)/1000).toFixed(1);
    document.getElementById('autoTitle').textContent='Autopilot Complete (' +totalSec+'s)';
    ntf('Pipeline complete in '+totalSec+'s!','success');
    showAutoResults();
  }catch(e){
    ntf('Pipeline error: '+e.message,'error');
    document.getElementById('autoTitle').textContent='Pipeline stopped (error)';
  }
  D.autoRunning=false;
  document.getElementById('autoBtn').disabled=false;
}

  html+='<div class="sc"><div class="sv">'+m.tau2.toFixed(3)+'</div><div class="sl">Tau-squared</div></div>';

  // Leave-one-out table

    html+='<div class="ct">Leave-One-Out Sensitivity Analysis</div>';
    html+='<div class="tw"><table class="dt"><thead><tr><th>Excluded Study</th><th>Pooled Estimate</th><th>95% CI</th></tr></thead><tbody>';

function saveAppraisalModal(idx){
  var a=D.screened[idx];if(!a)return;
  var ap=a.appraisal;
  ap.ocebm=document.getElementById('modOcebm').value;
  ap.design=document.getElementById('modDesign').value;
  ap.jadadItems={randMentioned:parseInt(document.getElementById('modJ1').value)||0,randAppropriate:parseInt(document.getElementById('modJ2').value)||0,blindMentioned:parseInt(document.getElementById('modJ3').value)||0,blindAppropriate:parseInt(document.getElementById('modJ4').value)||0,withdrawals:parseInt(document.getElementById('modJ5').value)||0};
  ap.jadad=(ap.jadadItems.randMentioned||0)+(ap.jadadItems.randAppropriate||0)+(ap.jadadItems.blindMentioned||0)+(ap.jadadItems.blindAppropriate||0)+(ap.jadadItems.withdrawals||0);
  ap.nosItems={selection:parseInt(document.getElementById('modNS').value)||0,comparability:parseInt(document.getElementById('modNC').value)||0,outcome:parseInt(document.getElementById('modNO').value)||0};
  ap.nos=(ap.nosItems.selection||0)+(ap.nosItems.comparability||0)+(ap.nosItems.outcome||0);
  ap.daprItems={data:parseInt(document.getElementById('modDD').value)||0,applicability:parseInt(document.getElementById('modDA').value)||0,performance:parseInt(document.getElementById('modDP').value)||0,relevance:parseInt(document.getElementById('modDR').value)||0};
  ap.daprTotal=(ap.daprItems.data||0)+(ap.daprItems.applicability||0)+(ap.daprItems.performance||0)+(ap.daprItems.relevance||0);
  ap.tofsc=document.getElementById('modTofsc').value;
  ap.manualOverride=true;
  ap.compositeScore=calcCompositeScore(ap);
  ap.decision=scoreDecision(ap.compositeScore);
  ap.classification=scoreClassification(ap.compositeScore);
  closeModal();
  ntf('Appraisal updated: Composite '+ap.compositeScore+'/100 = '+ap.decision.toUpperCase(),'success');
  if(document.getElementById('rt6'))document.getElementById('rt6').innerHTML=renderAppraisalTable();
  if(document.getElementById('msApBody'))msRenderAppr();
}
