<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharBioMed Synapse — AI Medical Affairs Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
--bg-deep:#050810;--bg-base:#0a0f1c;--bg-card:#0d1424;--bg-elev:#131c34;--bg-elev2:#1a2545;--bg-glass:rgba(13,20,36,0.7);
--bd:#1e2942;--bd-2:#2c3a5c;--bd-acc:#6366f1;
--t1:#f0f4fa;--t2:#94a3c1;--t3:#5a6783;--t4:#3a4666;
--indigo:#6366f1;--indigo-2:#818cf8;--violet:#a855f7;--violet-2:#c084fc;
--cyan:#06b6d4;--cyan-2:#22d3ee;--teal:#14b8a6;--emerald:#10b981;
--gold:#eab308;--amber:#f59e0b;--rose:#f43f5e;--red:#ef4444;--pink:#ec4899;--sky:#0ea5e9;
--grad-primary:linear-gradient(135deg,#6366f1 0%,#a855f7 100%);
--grad-cyan:linear-gradient(135deg,#06b6d4 0%,#14b8a6 100%);
--grad-hot:linear-gradient(135deg,#f43f5e 0%,#f59e0b 100%);
--grad-cool:linear-gradient(135deg,#0ea5e9 0%,#6366f1 100%);
--grad-success:linear-gradient(135deg,#10b981 0%,#22d3ee 100%);
--sh-sm:0 2px 8px rgba(0,0,0,0.2);--sh-md:0 4px 20px rgba(0,0,0,0.3);--sh-lg:0 12px 40px rgba(0,0,0,0.4);
--sh-glow:0 0 30px rgba(99,102,241,0.25);--sh-glow-cyan:0 0 30px rgba(6,182,212,0.25);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg-deep);color:var(--t1);font-family:'Inter',-apple-system,sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(99,102,241,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(168,85,247,0.06) 0%,transparent 50%),radial-gradient(ellipse at 100% 50%,rgba(6,182,212,0.05) 0%,transparent 50%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e2942;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#2c3a5c}

#app{display:grid;grid-template-columns:260px 1fr;height:100vh;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{background:linear-gradient(180deg,#0a0f1c 0%,#050810 100%);border-right:1px solid var(--bd);padding:22px 0;display:flex;flex-direction:column;overflow-y:auto}
.brand{padding:0 20px 20px;border-bottom:1px solid var(--bd);margin-bottom:14px}
.brand-logo{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.brand-mark{width:38px;height:38px;background:var(--grad-primary);border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;color:white;box-shadow:var(--sh-glow);position:relative;overflow:hidden}
.brand-mark svg{width:22px;height:22px}
.brand-mark::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,0.2))}
.brand-text h1{font-size:14px;font-weight:800;color:var(--t1);letter-spacing:-0.3px;line-height:1.2}
.brand-text p{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:1.4px;margin-top:3px;font-weight:600}
.brand-status{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--t2);background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);padding:4px 9px;border-radius:100px;width:fit-content;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.brand-status .dot{width:6px;height:6px;background:var(--emerald);border-radius:50%;box-shadow:0 0 8px var(--emerald);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease-out}
.nav-section{padding:0 12px;margin-bottom:14px}
.nav-label{font-size:9px;text-transform:uppercase;color:var(--t4);font-weight:700;letter-spacing:1.4px;padding:0 12px 8px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;font-size:12px;color:var(--t2);cursor:pointer;transition:all 0.15s;font-weight:500;margin-bottom:1px;border:1px solid transparent;position:relative}
.nav-item:hover{background:rgba(99,102,241,0.06);color:var(--t1)}
.nav-item.active{background:rgba(99,102,241,0.12);color:var(--t1);border-color:rgba(99,102,241,0.25)}
.nav-item.active::before{content:'';position:absolute;left:-12px;top:8px;bottom:8px;width:3px;background:var(--grad-primary);border-radius:0 2px 2px 0}
.nav-item svg{width:16px;height:16px;flex-shrink:0;stroke-width:2}
.nav-item .badge{margin-left:auto;background:var(--grad-primary);color:white;font-size:9px;font-weight:700;padding:2px 6px;border-radius:100px;min-width:18px;text-align:center}
.nav-item .badge.live{background:var(--rose);animation:pulse 2s infinite}
.sidebar-footer{margin-top:auto;padding:14px 20px;border-top:1px solid var(--bd)}
.user-card{display:flex;align-items:center;gap:10px;cursor:pointer}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--grad-cool);display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:11px}
.user-info{flex:1;min-width:0}
.user-info .name{font-size:12px;color:var(--t1);font-weight:600}
.user-info .role{font-size:10px;color:var(--t3)}

/* MAIN */
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{height:60px;border-bottom:1px solid var(--bd);background:rgba(10,15,28,0.85);backdrop-filter:blur(20px);display:flex;align-items:center;padding:0 24px;gap:16px;z-index:10}
.topbar-search{flex:1;max-width:520px;position:relative}
.topbar-search input{width:100%;background:var(--bg-card);border:1px solid var(--bd);color:var(--t1);padding:9px 14px 9px 38px;border-radius:9px;font-size:12px;outline:none;transition:all 0.2s;font-family:inherit}
.topbar-search input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
.topbar-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--t3)}
.topbar-search .kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--bg-elev);border:1px solid var(--bd);padding:2px 6px;border-radius:4px;font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;font-weight:600}
.topbar-actions{display:flex;align-items:center;gap:10px}
.tb-btn{background:var(--bg-card);border:1px solid var(--bd);width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);position:relative;transition:all 0.15s}
.tb-btn:hover{border-color:var(--bd-2);color:var(--t1);background:var(--bg-elev)}
.tb-btn svg{width:16px;height:16px}
.tb-btn .ndot{position:absolute;top:7px;right:7px;width:7px;height:7px;background:var(--rose);border-radius:50%;border:2px solid var(--bg-card)}
.copilot-trigger{background:var(--grad-primary);border:none;height:36px;padding:0 14px;border-radius:8px;color:white;font-size:11px;font-weight:700;display:flex;align-items:center;gap:7px;cursor:pointer;transition:all 0.15s;box-shadow:var(--sh-glow);text-transform:uppercase;letter-spacing:0.5px}
.copilot-trigger:hover{transform:translateY(-1px);box-shadow:0 6px 30px rgba(99,102,241,0.4)}
.copilot-trigger svg{width:14px;height:14px}

#page{flex:1;overflow-y:auto;padding:24px 28px 60px}

/* PAGE HEAD */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:24px}
.page-head h1{font-size:24px;font-weight:800;color:var(--t1);letter-spacing:-0.5px;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.page-head h1 svg{width:24px;height:24px;color:var(--indigo-2)}
.page-head .sub{font-size:12px;color:var(--t3)}
.page-head-actions{display:flex;gap:10px;align-items:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s;text-decoration:none}
.btn svg{width:14px;height:14px}
.btn-primary{background:var(--grad-primary);color:white;box-shadow:0 2px 12px rgba(99,102,241,0.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,0.4)}
.btn-secondary{background:var(--bg-card);color:var(--t1);border:1px solid var(--bd)}
.btn-secondary:hover{background:var(--bg-elev);border-color:var(--bd-2)}
.btn-ghost{background:transparent;color:var(--t2)}
.btn-ghost:hover{color:var(--t1);background:var(--bg-card)}
.btn-cyan{background:var(--grad-cyan);color:white;box-shadow:0 2px 12px rgba(6,182,212,0.3)}
.btn-sm{padding:6px 10px;font-size:11px}
.btn-xs{padding:4px 8px;font-size:10px}

/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--bd);border-radius:14px;padding:20px;position:relative;transition:border-color 0.2s}
.card:hover{border-color:var(--bd-2)}
.card.glow{box-shadow:var(--sh-glow);border-color:rgba(99,102,241,0.3)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-head h3{font-size:13px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:8px}
.card-head h3 svg{width:14px;height:14px;color:var(--indigo-2)}
.card-head .meta{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:600}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--bg-card);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;transition:all 0.2s}
.kpi:hover{border-color:var(--bd-2);transform:translateY(-2px)}
.kpi::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:var(--grad-primary);opacity:0.7}
.kpi.cyan::before{background:var(--grad-cyan)}
.kpi.hot::before{background:var(--grad-hot)}
.kpi.success::before{background:var(--grad-success)}
.kpi .label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.4px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.kpi .label svg{width:14px;height:14px}
.kpi .value{font-size:28px;font-weight:800;color:var(--t1);letter-spacing:-1px;font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:6px}
.kpi .delta{font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px}
.kpi .delta.up{color:var(--emerald)}
.kpi .delta.down{color:var(--rose)}
.kpi .delta svg{width:12px;height:12px}

/* PILLS */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:600;background:var(--bg-elev);color:var(--t2);border:1px solid var(--bd);text-transform:uppercase;letter-spacing:0.4px}
.pill.success{background:rgba(16,185,129,0.1);color:var(--emerald);border-color:rgba(16,185,129,0.25)}
.pill.warning{background:rgba(245,158,11,0.1);color:var(--amber);border-color:rgba(245,158,11,0.25)}
.pill.danger{background:rgba(244,63,94,0.1);color:var(--rose);border-color:rgba(244,63,94,0.25)}
.pill.info{background:rgba(99,102,241,0.1);color:var(--indigo-2);border-color:rgba(99,102,241,0.25)}
.pill.cyan{background:rgba(6,182,212,0.1);color:var(--cyan-2);border-color:rgba(6,182,212,0.25)}
.pill.violet{background:rgba(168,85,247,0.1);color:var(--violet-2);border-color:rgba(168,85,247,0.25)}
.pill.gold{background:rgba(234,179,8,0.1);color:var(--gold);border-color:rgba(234,179,8,0.25)}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:1px solid var(--bd)}
th{text-align:left;padding:11px 14px;font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:0.8px}
td{padding:13px 14px;color:var(--t2);border-bottom:1px solid rgba(30,41,66,0.6)}
tbody tr:hover td{background:rgba(99,102,241,0.04)}
tbody tr:last-child td{border-bottom:none}

/* LAYOUTS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.grid-1-2{display:grid;grid-template-columns:1fr 2fr;gap:16px}
.flex{display:flex}
.flex-col{display:flex;flex-direction:column}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}

/* AI INSIGHT CARD */
.insight{background:linear-gradient(135deg,rgba(99,102,241,0.06) 0%,rgba(168,85,247,0.04) 100%);border:1px solid rgba(99,102,241,0.2);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.insight::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--grad-primary)}
.insight-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.insight-icon{width:22px;height:22px;background:var(--grad-primary);border-radius:6px;display:flex;align-items:center;justify-content:center}
.insight-icon svg{width:13px;height:13px;color:white}
.insight-title{font-size:12px;font-weight:700;color:var(--t1);flex:1}
.insight-time{font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.insight-body{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:10px}
.insight-actions{display:flex;gap:8px;flex-wrap:wrap}
.insight-tag{font-size:9px;padding:3px 7px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);border-radius:4px;color:var(--indigo-2);font-weight:600}

/* ENTITY HIGHLIGHTING */
.ent{display:inline-block;padding:1px 5px;border-radius:4px;font-weight:600;font-size:inherit}
.ent-drug{background:rgba(99,102,241,0.15);color:var(--indigo-2);border-bottom:1px solid var(--indigo)}
.ent-disease{background:rgba(244,63,94,0.12);color:var(--rose);border-bottom:1px solid var(--rose)}
.ent-biomarker{background:rgba(6,182,212,0.12);color:var(--cyan-2);border-bottom:1px solid var(--cyan)}
.ent-trial{background:rgba(168,85,247,0.12);color:var(--violet-2);border-bottom:1px solid var(--violet)}
.ent-kol{background:rgba(234,179,8,0.12);color:var(--gold);border-bottom:1px solid var(--gold)}
.ent-org{background:rgba(16,185,129,0.12);color:var(--emerald);border-bottom:1px solid var(--emerald)}

/* SIGNAL FEED */
.signal{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--bd);transition:background 0.15s;cursor:pointer}
.signal:hover{background:rgba(99,102,241,0.04)}
.signal:last-child{border-bottom:none}
.signal-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg-elev);border:1px solid var(--bd)}
.signal-icon svg{width:16px;height:16px}
.signal-icon.high{background:rgba(244,63,94,0.1);border-color:rgba(244,63,94,0.3);color:var(--rose)}
.signal-icon.med{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.3);color:var(--amber)}
.signal-icon.low{background:rgba(6,182,212,0.1);border-color:rgba(6,182,212,0.3);color:var(--cyan-2)}
.signal-icon.opp{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.3);color:var(--emerald)}
.signal-body{flex:1;min-width:0}
.signal-title{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:3px}
.signal-desc{font-size:11px;color:var(--t3);line-height:1.5}
.signal-meta{display:flex;gap:10px;margin-top:6px;align-items:center}
.signal-meta .src{font-size:9px;color:var(--t4);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.5px}

/* CHARTS */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding:12px 0}
.bar{flex:1;background:var(--grad-primary);border-radius:4px 4px 0 0;position:relative;cursor:pointer;transition:all 0.2s;min-height:4px;opacity:0.85}
.bar:hover{opacity:1;transform:translateY(-2px)}
.bar.cyan{background:var(--grad-cyan)}
.bar.alt{background:var(--bg-elev2)}

.donut{position:relative;width:140px;height:140px;display:flex;align-items:center;justify-content:center}
.donut svg{transform:rotate(-90deg)}
.donut .cv{position:absolute;text-align:center}
.donut .cv .v{font-size:22px;font-weight:800;color:var(--t1);font-family:'JetBrains Mono',monospace}
.donut .cv .l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px}

.spark{display:flex;align-items:flex-end;gap:2px;height:32px}
.spark .b{flex:1;background:var(--indigo);border-radius:1px;opacity:0.7;min-height:2px}

/* PROGRESS BARS */
.progress{height:6px;background:var(--bg-elev);border-radius:100px;overflow:hidden;position:relative}
.progress .fill{height:100%;background:var(--grad-primary);border-radius:100px;transition:width 0.5s ease}
.progress .fill.cyan{background:var(--grad-cyan)}
.progress .fill.success{background:var(--grad-success)}
.progress .fill.hot{background:var(--grad-hot)}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg-card);border:1px solid var(--bd);border-radius:10px;padding:3px;width:fit-content;margin-bottom:18px}
.tabs button{background:transparent;border:none;color:var(--t2);padding:8px 16px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:inherit;display:flex;align-items:center;gap:6px}
.tabs button:hover{color:var(--t1)}
.tabs button.active{background:var(--bg-elev);color:var(--t1);box-shadow:var(--sh-sm)}
.tabs button svg{width:13px;height:13px}

/* INPUTS */
input[type="text"],input[type="email"],input[type="search"],input[type="number"],input[type="date"],textarea,select{background:var(--bg-card);border:1px solid var(--bd);border-radius:8px;padding:9px 12px;color:var(--t1);font-size:12px;outline:none;width:100%;font-family:inherit;transition:all 0.15s}
input:focus,textarea:focus,select:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
label{font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:700;letter-spacing:0.8px;display:block;margin-bottom:6px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(5,8,16,0.85);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg-card);border:1px solid var(--bd);border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:15px;font-weight:700;color:var(--t1)}
.modal-body{padding:22px}
.modal-close{background:transparent;border:none;color:var(--t3);cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg-elev);color:var(--t1)}
.modal label{display:block;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;font-weight:700;margin-bottom:5px}
.modal input[type="text"],.modal input[type="email"],.modal input[type="number"],.modal input[type="date"],.modal input[type="tel"],.modal textarea,.modal select{width:100%;background:var(--bg-elev);border:1px solid var(--bd);color:var(--t1);padding:9px 12px;border-radius:8px;font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--indigo)}
.modal textarea{resize:vertical;min-height:60px}

/* TOAST NOTIFICATIONS */
#toast-container{position:fixed;top:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:10px;pointer-events:none;max-width:400px}
.toast{pointer-events:auto;background:var(--bg-card);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;box-shadow:var(--sh-lg);animation:slideInRight .3s cubic-bezier(.4,0,.2,1) forwards;backdrop-filter:blur(12px);min-width:280px}
.toast.success{border-left:3px solid var(--emerald);background:linear-gradient(90deg,rgba(16,185,129,0.08) 0%,var(--bg-card) 40%)}
.toast.error{border-left:3px solid var(--rose);background:linear-gradient(90deg,rgba(244,63,94,0.08) 0%,var(--bg-card) 40%)}
.toast.info{border-left:3px solid var(--indigo);background:linear-gradient(90deg,rgba(99,102,241,0.08) 0%,var(--bg-card) 40%)}
.toast.warning{border-left:3px solid var(--amber);background:linear-gradient(90deg,rgba(245,158,11,0.08) 0%,var(--bg-card) 40%)}
.toast-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
.toast.success .toast-icon{color:var(--emerald)}
.toast.error .toast-icon{color:var(--rose)}
.toast.info .toast-icon{color:var(--indigo-2)}
.toast.warning .toast-icon{color:var(--amber)}
.toast-icon svg{width:18px;height:18px}
.toast-msg{flex:1;font-size:12px;color:var(--t1);line-height:1.5;font-weight:500}
.toast-close{background:transparent;border:none;color:var(--t4);cursor:pointer;padding:0;width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.6;transition:opacity .15s}
.toast-close:hover{opacity:1;color:var(--t1)}
.toast-close svg{width:14px;height:14px}
@keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOutRight{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}

/* DRAWER (CO-PILOT) */
.drawer{position:fixed;top:0;right:0;bottom:0;width:440px;background:var(--bg-base);border-left:1px solid var(--bd);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.3s ease;box-shadow:-20px 0 60px rgba(0,0,0,0.5)}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px}
.drawer-head .av{width:38px;height:38px;background:var(--grad-primary);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;box-shadow:var(--sh-glow)}
.drawer-head .av svg{width:18px;height:18px}
.drawer-head h3{font-size:14px;font-weight:800;color:var(--t1)}
.drawer-head p{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.drawer-close{margin-left:auto;background:var(--bg-card);border:1px solid var(--bd);width:30px;height:30px;border-radius:8px;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.drawer-close:hover{color:var(--t1)}
.drawer-body{flex:1;overflow-y:auto;padding:18px 22px}
.drawer-input{padding:14px 22px;border-top:1px solid var(--bd);display:flex;gap:8px}
.drawer-input input{flex:1}
.drawer-input button{background:var(--grad-primary);border:none;width:38px;height:38px;border-radius:8px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center}

.msg{margin-bottom:14px;animation:fadeIn 0.3s ease-out}
.msg.user{display:flex;justify-content:flex-end}
.msg.user .bubble{background:var(--grad-primary);color:white;border-radius:14px 14px 4px 14px;padding:10px 14px;max-width:85%;font-size:12px}
.msg.ai .bubble{background:var(--bg-card);border:1px solid var(--bd);border-radius:14px 14px 14px 4px;padding:12px 14px;max-width:90%;font-size:12px;color:var(--t1);line-height:1.6}
.msg.ai .bubble strong{color:var(--indigo-2)}
.msg-suggest{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.msg-suggest button{background:var(--bg-elev);border:1px solid var(--bd);color:var(--t2);padding:8px 12px;border-radius:8px;font-size:11px;cursor:pointer;text-align:left;transition:all 0.15s;font-family:inherit}
.msg-suggest button:hover{background:var(--bg-elev2);color:var(--t1);border-color:var(--bd-2)}

/* KOL SCORE RING */
.score-ring{position:relative;width:48px;height:48px;display:flex;align-items:center;justify-content:center}
.score-ring svg{position:absolute;transform:rotate(-90deg)}
.score-ring .v{font-size:13px;font-weight:800;color:var(--t1);font-family:'JetBrains Mono',monospace}

/* HEATMAP */
.heatmap{display:grid;grid-template-columns:repeat(12,1fr);gap:3px}
.heatmap .cell{aspect-ratio:1;border-radius:3px;background:var(--bg-elev);transition:all 0.15s;cursor:pointer}
.heatmap .cell:hover{transform:scale(1.4);z-index:10;position:relative}
.heatmap .cell.l1{background:rgba(99,102,241,0.15)}
.heatmap .cell.l2{background:rgba(99,102,241,0.3)}
.heatmap .cell.l3{background:rgba(99,102,241,0.5)}
.heatmap .cell.l4{background:rgba(99,102,241,0.7)}
.heatmap .cell.l5{background:var(--indigo)}

/* NETWORK GRAPH */
#network-canvas{width:100%;height:480px;background:radial-gradient(ellipse at center,rgba(99,102,241,0.04) 0%,transparent 70%);border-radius:12px;display:block}

/* DRAG/DROP */
.drop-zone{border:2px dashed var(--bd-2);border-radius:14px;padding:40px;text-align:center;cursor:pointer;transition:all 0.2s;background:rgba(99,102,241,0.02)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--indigo);background:rgba(99,102,241,0.05)}
.drop-zone svg{width:38px;height:38px;color:var(--indigo-2);margin-bottom:10px}
.drop-zone h4{font-size:14px;color:var(--t1);font-weight:700;margin-bottom:6px}
.drop-zone p{font-size:11px;color:var(--t3)}

/* WORKFLOW STEPS */
.workflow{display:flex;align-items:center;gap:0;margin-bottom:24px;background:var(--bg-card);border:1px solid var(--bd);border-radius:12px;padding:16px 20px;overflow-x:auto}
.wf-step{display:flex;align-items:center;gap:10px;padding:0 18px;position:relative;flex-shrink:0}
.wf-step:not(:last-child)::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:24px;height:1px;background:var(--bd)}
.wf-step .num{width:26px;height:26px;border-radius:50%;background:var(--bg-elev);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t3);font-family:'JetBrains Mono',monospace}
.wf-step.active .num{background:var(--grad-primary);border-color:var(--indigo);color:white;box-shadow:0 0 0 3px rgba(99,102,241,0.2)}
.wf-step.done .num{background:rgba(16,185,129,0.15);border-color:var(--emerald);color:var(--emerald)}
.wf-step .lbl{font-size:11px;color:var(--t3);font-weight:600}
.wf-step.active .lbl{color:var(--t1)}
.wf-step.done .lbl{color:var(--emerald)}

/* TRUNCATE */
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* MONO */
.mono{font-family:'JetBrains Mono',monospace}

/* BADGE INLINE */
.bdg{display:inline-block;padding:2px 7px;font-size:9px;border-radius:4px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase}
.bdg-i{background:rgba(99,102,241,0.15);color:var(--indigo-2)}
.bdg-c{background:rgba(6,182,212,0.15);color:var(--cyan-2)}
.bdg-v{background:rgba(168,85,247,0.15);color:var(--violet-2)}
.bdg-g{background:rgba(234,179,8,0.15);color:var(--gold)}
.bdg-r{background:rgba(244,63,94,0.15);color:var(--rose)}
.bdg-e{background:rgba(16,185,129,0.15);color:var(--emerald)}

/* SHIMMER LOADING */
.shimmer{background:linear-gradient(90deg,var(--bg-card) 0%,var(--bg-elev) 50%,var(--bg-card) 100%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.thinking{display:inline-flex;align-items:center;gap:6px;color:var(--indigo-2);font-size:11px;font-weight:600}
.thinking .dots{display:inline-flex;gap:3px}
.thinking .dots span{width:5px;height:5px;border-radius:50%;background:var(--indigo);animation:bounce 1.4s infinite}
.thinking .dots span:nth-child(2){animation-delay:0.2s}
.thinking .dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0);opacity:0.3}40%{transform:scale(1);opacity:1}}

.empty{text-align:center;padding:40px;color:var(--t3)}
.empty svg{width:48px;height:48px;margin-bottom:12px;opacity:0.5}
.empty h4{font-size:13px;color:var(--t2);margin-bottom:4px}
.empty p{font-size:11px;color:var(--t4)}

@media (max-width:1280px){#app{grid-template-columns:220px 1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>

  msl_notes:[
    {id:'n1',date:'2026-04-02',kolId:'k1',msl:'David Park',channel:'In-person (ASCO booth)',duration:38,content:`Met with Dr. Marcus Chen at the ASCO booth. He raised significant interest in VELOXATIB's CNS penetration data versus sotorasib and adagrasib. Specifically asked about intracranial response rate (iORR) in the brain metastases cohort and CSF concentration data. He mentioned that 30-40% of his KRAS G12C+ NSCLC patients develop CNS metastases and current options are inadequate.\n\nDr. Chen is currently enrolling 8 patients in VELOX-301 and would like to expand the CNS sub-study at his site. He proposed a dedicated brain mets cohort and offered to be PI on a CNS-focused investigator-initiated trial (IIT). \n\nHe also expressed concern about resistance mechanisms — specifically Y96D mutation emergence — and asked whether VELOXATIB has differentiated activity. Discussed our preclinical data on second-site mutations.\n\nAction items: (1) send CNS subgroup analysis from VELOX-201 within 5 days, (2) connect with translational team on Y96D data, (3) facilitate IIT proposal review, (4) confirm steering committee invitation.\n\nOverall sentiment: highly engaged and supportive; eager to advocate for VELOXATIB in his network.`,sentiment:0.88,topics:['CNS penetration','brain metastases','resistance','IIT','steering committee'],entities:{drugs:['VELOXATIB','sotorasib','adagrasib'],biomarkers:['KRAS G12C','Y96D'],trials:['VELOX-301','VELOX-201'],orgs:['ASCO']}},
    {id:'n2',date:'2026-03-28',kolId:'k2',msl:'Jennifer Liu',channel:'Video call',duration:45,content:`Dr. Sarah Whitfield discussed her recent retrospective analysis of 240 KRAS G12C+ NSCLC patients at her institution. Key findings: median real-world PFS on sotorasib is 5.2 months, well below Phase III data. She believes patient selection and co-mutation status drives this gap.\n\nShe asked extensively about VELOXATIB's STK11 and KEAP1 co-mutation subgroup data. She is presenting at WCLC and wants to compare RWE outcomes across G12C inhibitors. Requested access to VELOX-201 patient-level co-mutation outcomes (de-identified) for comparative analysis.\n\nDr. Whitfield is concerned about hepatotoxicity signals in our Phase III update. Asked specifically about Grade 3+ ALT elevation rates and management algorithms. Discussed our risk mitigation strategy and dose modification guidelines.\n\nShe mentioned that her institution is developing a "G12C clinic" model and would value VELOXATIB-specific patient education materials.\n\nAction items: (1) request medical/translational review for de-identified data sharing, (2) send hepatotox management algorithm, (3) develop "G12C clinic" patient materials, (4) invite to advisory board on co-mutation strategy.\n\nSentiment: positive but analytical — wants more data before becoming an advocate.`,sentiment:0.71,topics:['real-world outcomes','co-mutations','STK11','KEAP1','hepatotoxicity','patient education'],entities:{drugs:['VELOXATIB','sotorasib'],biomarkers:['KRAS G12C','STK11','KEAP1'],trials:['VELOX-201'],orgs:['WCLC']}},
    {id:'n3',date:'2026-03-22',kolId:'k6',msl:'Marcus Williams',channel:'In-person (institution visit)',duration:55,content:`Productive meeting with Dr. Aisha Okonkwo at Great Lakes Medical. She is the principal investigator on VELOX-IO, our Phase Ib combination study with pembrolizumab. Discussed enrollment progress: 14/20 patients enrolled, no dose-limiting toxicities to date.\n\nShe shared interim safety observations: pneumonitis rates appear lower than expected (5% vs 12% expected with similar combinations). She believes VELOXATIB's selectivity profile may explain this. Wants to present preliminary data at SITC.\n\nDr. Okonkwo raised the question of whether VELOXATIB should be moved to first-line setting earlier given the favorable safety profile. She advocates for a head-to-head trial vs sotorasib + chemo in 1L. Discussed our first-line strategy and PHASE III VELOX-FRONT design considerations.\n\nShe also asked about durvalumab combination potential — she's involved in another trial exploring this. Suggested we consider dual checkpoint inhibitor combinations.\n\nAction items: (1) confirm SITC abstract submission timeline, (2) connect her with VELOX-FRONT study team, (3) explore durvalumab IIT, (4) provide updated combination IB safety summary.\n\nSentiment: highly positive, advocating for accelerated development.`,sentiment:0.85,topics:['IO combinations','pembrolizumab','pneumonitis','first-line','VELOX-FRONT'],entities:{drugs:['VELOXATIB','pembrolizumab','sotorasib','durvalumab'],biomarkers:['KRAS G12C'],trials:['VELOX-IO','VELOX-FRONT'],orgs:['SITC']}},
    {id:'n4',date:'2026-03-15',kolId:'k3',msl:'Anjali Mehta',channel:'Phone',duration:30,content:`Dr. Rajesh Krishnan expressed concerns about VELOXATIB's positioning. He argues that patients with TP53 co-mutations have been underrepresented in our pivotal trial and questions generalizability. He cites his own data showing TP53-mutant KRAS G12C patients have 40% worse outcomes on first-gen G12C inhibitors.\n\nHe is hesitant to recommend VELOXATIB to TP53+ patients without specific subgroup data. Asked for our planned approach to this segment in label expansion.\n\nHe also raised competitive concerns: Roche's GLECIRASIB-N data at AACR showed 58% ORR which is comparable to our Phase II data. Wants to understand differentiation strategy.\n\nDr. Krishnan asked about our pricing/access strategy. Concerned about community oncology adoption given access barriers with current G12C inhibitors.\n\nAction items: (1) escalate TP53 subgroup request to clinical team, (2) prepare competitive differentiation deck (vs GLECIRASIB-N), (3) connect with market access lead.\n\nSentiment: skeptical but engaged; needs more compelling differentiation data to advocate.`,sentiment:0.42,topics:['TP53 co-mutations','competitive intelligence','GLECIRASIB','pricing','market access'],entities:{drugs:['VELOXATIB','GLECIRASIB-N'],biomarkers:['KRAS G12C','TP53'],trials:[],orgs:['AACR','Roche']}},
    {id:'n5',date:'2026-04-05',kolId:'k5',msl:'David Park',channel:'Video call',duration:60,content:`Strategic discussion with Dr. James Holloway about translational research collaboration. He runs the Northeast Translational Oncology Consortium and has access to 800+ KRAS G12C+ tumor samples with matched outcomes data.\n\nProposed a research collaboration: PharBioMed provides VELOXATIB pharmacology data, his consortium provides tumor profiling. Joint analysis of resistance mechanisms post-VELOXATIB. He's particularly interested in adaptive resistance pathways and combination rationale.\n\nDr. Holloway is interested in being co-author on key VELOXATIB resistance publication. Shared his recent Cell paper on MAPK pathway feedback loops in KRAS-driven NSCLC.\n\nHe also raised the LKB1/STK11 question — believes this co-mutation defines a uniquely resistant subset that needs special consideration. Suggested SHP2 + KRAS combination strategy. Asked about our PBM-318 (SHP2 inhibitor) timeline.\n\nDiscussed potential collaboration on PBM-318 + VELOXATIB combination IIT.\n\nAction items: (1) draft research collaboration MOU, (2) connect translational team for sample sharing, (3) explore PBM-318 IIT opportunity, (4) confirm Cell paper as supporting reference for next pub.\n\nSentiment: extremely positive — strategic ally and translational champion.`,sentiment:0.91,topics:['translational research','resistance','LKB1/STK11','SHP2 combination','PBM-318','collaboration'],entities:{drugs:['VELOXATIB','PBM-318'],biomarkers:['KRAS G12C','LKB1','STK11'],trials:[],orgs:['Northeast Translational Oncology Consortium','Cell']}},
    {id:'n6',date:'2026-03-30',kolId:'k8',msl:'Sarah Kim',channel:'In-person (regional meeting)',duration:42,content:`Dr. Yuki Tanaka shared insights on Asian patient populations and KRAS G12C epidemiology. Notable: KRAS G12C prevalence in Asian NSCLC populations is 8-10% vs 13% in Western — this affects market sizing.\n\nDiscussed pharmacogenomic considerations: CYP3A4 variants more common in Asian populations may affect VELOXATIB metabolism. Asked whether we have ethnic subgroup PK data. Has Phase I data showing similar exposure across populations.\n\nDr. Tanaka is enthusiastic about VELOXATIB's tolerability profile relative to sotorasib. She has 6 patients on VELOXATIB EAP (early access program) and reports good tolerability with manageable GI adverse events.\n\nShe wants to organize a regional advisory board for Pacific Rim oncologists focused on KRAS G12C management. Requested PharBioMed sponsorship.\n\nAction items: (1) provide ethnic PK subgroup analysis, (2) gather EAP patient experience data, (3) propose Pacific Rim advisory board to medical leadership, (4) connect with epidemiology team on Asian market sizing.\n\nSentiment: strong advocate; champion in Pacific Rim region.`,sentiment:0.83,topics:['Asian populations','epidemiology','pharmacogenomics','tolerability','EAP','regional advisory'],entities:{drugs:['VELOXATIB','sotorasib'],biomarkers:['KRAS G12C','CYP3A4'],trials:[],orgs:['EAP']}},
    {id:'n7',date:'2026-03-25',kolId:'k11',msl:'Hans Mueller',channel:'In-person (EU congress)',duration:50,content:`Met with Dr. Lars Eriksen at EHA. He confirmed the Nordic Cancer Research Group will participate in VELOX-FRONT (1L trial). He has 12 sites ready to enroll across Denmark, Sweden, Norway, and Finland.\n\nDr. Eriksen raised the EMA filing strategy. He recommends including European real-world data (RWD) in the regulatory package given recent EMA guidance. Offered to facilitate data sharing from the Nordic G12C registry (1,200+ patients).\n\nDiscussed the upcoming ESMO presentation. He suggested PharBioMed sponsor a satellite symposium on KRAS G12C management with European KOLs. Proposed faculty: himself, Dr. Bellucci, two German oncologists.\n\nHe expressed concern about EMA's recent skepticism on accelerated approvals based on single-arm trials. Recommends continued investment in confirmatory Phase III data.\n\nAction items: (1) confirm Nordic site activation timeline, (2) facilitate Nordic registry data access, (3) propose ESMO satellite symposium budget, (4) provide EMA strategy briefing to medical leadership.\n\nSentiment: highly positive; strategic European partner.`,sentiment:0.79,topics:['EMA strategy','RWD','Nordic registry','ESMO symposium','VELOX-FRONT'],entities:{drugs:['VELOXATIB'],biomarkers:['KRAS G12C'],trials:['VELOX-FRONT'],orgs:['EMA','ESMO','EHA','Nordic Cancer Research Group']}},
    {id:'n8',date:'2026-02-20',kolId:'k4',msl:'Marcus Williams',channel:'Video call',duration:25,content:`Brief call with Dr. Elena Rodriguez-Vega. She is frustrated with VELOXATIB's slow EAP enrollment process at her institution. Took 6 weeks to get her first patient enrolled. This delays advocacy.\n\nShe also raised competitive intelligence: Bristol-Myers Squibb just licensed a KRAS G12C inhibitor from a Chinese biotech with potentially better CNS data. She's been approached to participate in their trial.\n\nDr. Rodriguez-Vega questioned whether VELOXATIB's PFS advantage will be meaningful in clinical practice given crossover and real-world heterogeneity. Wants more compelling ORR data.\n\nAction items: (1) URGENT — escalate EAP enrollment delays to operations, (2) competitive intel investigation on BMS licensing deal, (3) provide updated ORR/PFS analyses.\n\nSentiment: negative drift — needs urgent re-engagement to prevent loss to competitor.`,sentiment:0.28,topics:['EAP delays','BMS competition','operational issues','PFS','ORR'],entities:{drugs:['VELOXATIB'],biomarkers:['KRAS G12C'],trials:[],orgs:['BMS','EAP']}},
    {id:'n9',date:'2026-03-10',kolId:'k12',msl:'Hans Mueller',channel:'Video call',duration:35,content:`Dr. Chiara Bellucci shared her group's research on tumor microenvironment changes following KRAS G12C inhibition. She's identified specific immune signatures associated with response/resistance. Wants to apply this analysis to VELOX-301 patients.\n\nDiscussed potential biomarker collaboration. She has a validated immune signature panel that could identify likely responders. This could support precision medicine positioning of VELOXATIB.\n\nDr. Bellucci asked about combination strategies with TIGIT inhibitors based on her translational data showing TIGIT upregulation post-G12C inhibition. Suggested VELOXATIB + tiragolumab combination.\n\nShe will be presenting at AACR with new data on KRAS G12C + immune microenvironment. Requested PharBioMed data for inclusion if appropriate.\n\nAction items: (1) review immune signature panel for VELOX-301 application, (2) explore TIGIT combination IIT, (3) provide AACR data review.\n\nSentiment: positive, scientifically engaged.`,sentiment:0.74,topics:['tumor microenvironment','immune signatures','TIGIT combination','biomarkers','AACR'],entities:{drugs:['VELOXATIB','tiragolumab'],biomarkers:['KRAS G12C','TIGIT'],trials:['VELOX-301'],orgs:['AACR']}},
    {id:'n10',date:'2026-04-01',kolId:'k10',msl:'Anjali Mehta',channel:'In-person (institution visit)',duration:48,content:`Comprehensive visit with Dr. Priya Venkataraman at Atlantic Biomedical. She is leading their ctDNA-based co-mutation profiling program for KRAS G12C+ patients. Has profiled 380 patients in past 18 months.\n\nKey findings she shared: TP53 co-mutation present in 62% of G12C+ NSCLC, STK11 in 18%, KEAP1 in 12%. Triple co-mutated (KRAS/TP53/STK11) patients have median OS of just 8 months on first-gen G12C inhibitors.\n\nDr. Venkataraman is interested in co-mutation-stratified data for VELOXATIB. Asked if PharBioMed would support a prospective ctDNA companion diagnostic study.\n\nShe also discussed her enthusiasm for VELOXATIB's preliminary data in STK11+ subset (52% ORR vs 28% for sotorasib). Wants to design a confirmatory IIT.\n\nDr. Venkataraman raised payer challenges — testing for full co-mutation panel not consistently reimbursed. Suggested PharBioMed consider co-pay/access support tied to comprehensive testing.\n\nAction items: (1) explore companion diagnostic partnership, (2) support STK11+ subset IIT, (3) connect with market access on testing reimbursement, (4) request her ctDNA dataset (de-identified) for our analysis.\n\nSentiment: strong scientific advocate; potential partnership champion.`,sentiment:0.82,topics:['ctDNA','co-mutations','companion diagnostic','STK11','market access','reimbursement'],entities:{drugs:['VELOXATIB','sotorasib'],biomarkers:['KRAS G12C','TP53','STK11','KEAP1','ctDNA'],trials:[],orgs:[]}},
    {id:'n11',date:'2026-03-18',kolId:'k7',msl:'David Park',channel:'Phone',duration:22,content:`Dr. Dmitri Volkov called to discuss his concerns about VELOXATIB's positioning in 2L+ setting. He believes the 1L space is where differentiation matters most given that all G12C inhibitors will eventually be 1L.\n\nHe expressed disappointment that VELOX-FRONT (1L Phase III) won't read out until late 2027. Argues this delay will hurt commercial uptake versus competitors who are pushing 1L data.\n\nHe also raised compliance concerns about a recent CME program where a competitor speaker made off-label claims. Wants to ensure PharBioMed maintains scientific integrity in our educational programs.\n\nDr. Volkov asked about VELOXATIB's combination with chemo data. Has anecdotal evidence from EAP that combination is well-tolerated. Suggested formal Phase Ib study.\n\nAction items: (1) review 1L strategy timeline with leadership, (2) flag competitor compliance issue to medical/legal, (3) explore chemo combination Phase Ib design.\n\nSentiment: critical but constructive; wants to see strategic clarity.`,sentiment:0.51,topics:['1L strategy','VELOX-FRONT','compliance','chemo combination'],entities:{drugs:['VELOXATIB'],biomarkers:['KRAS G12C'],trials:['VELOX-FRONT'],orgs:[]}},
    {id:'n12',date:'2026-01-15',kolId:'k9',msl:'Sarah Kim',channel:'Phone',duration:18,content:`Dr. Michael Bergstrom expressed limited enthusiasm for VELOXATIB. Cited "another G12C inhibitor" fatigue and lack of clear differentiation versus established options. His community oncology practice has only 4 G12C+ NSCLC patients per year.\n\nHe's concerned about practical issues: testing turnaround time, prior authorization burden, patient out-of-pocket costs. Believes most community oncologists will default to whatever's easiest to access.\n\nNo interest in clinical trial participation given low patient volume. Suggested PharBioMed focus efforts on academic centers.\n\nAction items: (1) assess re-engagement priority, (2) gather community oncology insights for adoption strategy, (3) lower-touch engagement plan.\n\nSentiment: low engagement; community oncology challenges.`,sentiment:0.22,topics:['community oncology','adoption barriers','prior auth','differentiation'],entities:{drugs:['VELOXATIB'],biomarkers:['KRAS G12C'],trials:[],orgs:[]}},

  trialTerms:['VELOX-301','VELOX-FRONT','VELOX-IO','VELOX-CNS','VELOX-201','KRYSTAL-12'],

  highlightEntities(text){
    if(!text) return '';
    let html = this.escapeHtml(text);
    const ents = [
      {terms:this.drugTerms,cls:'ent-drug'},
      {terms:this.trialTerms,cls:'ent-trial'},
      {terms:this.biomarkerTerms,cls:'ent-biomarker'},
      {terms:this.diseaseTerms,cls:'ent-disease'},
      {terms:this.orgTerms,cls:'ent-org'},
    ];
    ents.forEach(({terms,cls})=>{
      terms.forEach(t=>{
        const re = new RegExp('\\b('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')\\b','gi');
        html = html.replace(re,`<span class="ent ${cls}">$1</span>`);
      });
    });
    return html;
  },

  extractEntities(text){
    const out = {drugs:new Set(),biomarkers:new Set(),trials:new Set(),diseases:new Set(),orgs:new Set()};
    const lower = text.toLowerCase();
    this.drugTerms.forEach(t=>{if(lower.includes(t.toLowerCase()))out.drugs.add(t)});
    this.biomarkerTerms.forEach(t=>{if(lower.includes(t.toLowerCase()))out.biomarkers.add(t)});
    this.trialTerms.forEach(t=>{if(lower.includes(t.toLowerCase()))out.trials.add(t)});
    this.diseaseTerms.forEach(t=>{if(lower.includes(t.toLowerCase()))out.diseases.add(t)});
    this.orgTerms.forEach(t=>{if(lower.includes(t.toLowerCase()))out.orgs.add(t)});
    return {drugs:[...out.drugs],biomarkers:[...out.biomarkers],trials:[...out.trials],diseases:[...out.diseases],orgs:[...out.orgs]};
  },

  computeSentiment(text){
    const pos = ['excellent','positive','enthusiastic','advocate','strong','great','impressive','supportive','engaged','champion','collaboration','interested','favorable','encouraging','breakthrough','promising','responsive'];
    const neg = ['concerned','frustrated','negative','skeptical','disappointed','worried','hesitant','barriers','delays','poor','limited','critical','reject','reluctant','issue','problem','fail','low','bad'];
    const lower = text.toLowerCase();
    let score = 0.5;
    pos.forEach(w=>{if(lower.includes(w))score+=0.04});
    neg.forEach(w=>{if(lower.includes(w))score-=0.05});
    return Math.max(0,Math.min(1,score));
  },

  extractTopics(text){
    const topicMap = {
      'CNS / Brain Metastases':['cns','brain met','brain metastas','intracranial','csf'],
      'Resistance Mechanisms':['resistance','y96','adaptive','feedback','mutation emergence'],
      'Co-mutations':['co-mutation','co mutation','tp53','stk11','keap1','lkb1','triple'],
      'Combinations / IO':['combination','pembro','immuno','io ','checkpoint','tigit','durvalumab','atezolizumab'],
      'Real-World Evidence':['real-world','real world','rwe','rwd','registry','retrospective'],
      'Safety / Tolerability':['hepatotox','alt','pneumonitis','adverse','tolerability','grade 3','grade iii','toxicity'],
      'Market Access':['access','pricing','reimburs','payer','prior auth','copay'],
      'First-Line Strategy':['1l','first-line','first line','front-line','front line','velox-front'],
      'Competitive Intelligence':['sotorasib','adagrasib','glecirasib','divarasib','competitor','competitive','amgen','bms','roche'],
      'Translational Science':['translational','signature','panel','ctdna','biomarker','companion diagnostic'],
    };
    const lower = text.toLowerCase();
    const found = [];
    Object.entries(topicMap).forEach(([topic,kws])=>{
      const matches = kws.filter(k=>lower.includes(k)).length;
      if(matches > 0) found.push({topic,score:matches});
    });
    return found.sort((a,b)=>b.score-a.score).map(t=>t.topic);
  },

  extractActions(text){
    const actions = [];
    const lines = text.split('\n');
    lines.forEach(line=>{
      if(/action item/i.test(line) || /^\s*\(?\d+\)?[.)]\s/.test(line) || /^\s*-\s/.test(line)){
        const cleaned = line.replace(/^action items?:?/i,'').replace(/^\s*\(?\d+\)?[.)]\s*/,'').replace(/^\s*-\s*/,'').trim();
        if(cleaned && cleaned.length > 10) actions.push(cleaned);
      }
    });
    return actions;
  },

const fmt = {
  num(n){return new Intl.NumberFormat('en-US').format(n)},
  cur(n){return '$'+new Intl.NumberFormat('en-US',{maximumFractionDigits:0}).format(n)},
  pct(n,dec=1){return (n*100).toFixed(dec)+'%'},
  date(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})},
  dateShort(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})},
  ago(d){const ms=Date.now()-new Date(d).getTime();const days=Math.floor(ms/86400000);if(days===0)return 'today';if(days===1)return 'yesterday';if(days<30)return days+'d ago';if(days<365)return Math.floor(days/30)+'mo ago';return Math.floor(days/365)+'y ago'},
};

const html = (strings, ...values) => {
  let result = '';
  strings.forEach((s,i)=>{result += s; if(i<values.length){const v=values[i];result += Array.isArray(v)?v.join(''):(v??'')}});
  return result;
};

const Toast = {
  container: null,
  init(){
    if(this.container) return;
    this.container = document.createElement('div');
    this.container.id = 'toast-container';
    document.body.appendChild(this.container);
  },
  show(msg, type='success', duration=3500){
    this.init();
    const t = document.createElement('div');
    t.className = 'toast '+type;
    const icons = {success:ICONS.check,error:ICONS.alert,info:ICONS.sparkle,warning:ICONS.alert};
    t.innerHTML = `
      <div class="toast-icon">${icons[type]}</div>
      <div class="toast-msg">${msg}</div>
      <button class="toast-close" onclick="this.parentElement.remove()">${ICONS.close}</button>
    `;
    this.container.appendChild(t);
    setTimeout(()=>{
      t.style.animation = 'slideOutRight 0.3s ease-in forwards';
      setTimeout(()=>t.remove(), 280);
    }, duration);
  }
};

const ModalSys = {
  current: null,
  open(opts){
    this.close();
    const root = document.getElementById('modal-root');
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.onclick = (e)=>{if(e.target===bg) this.close()};

    const modal = document.createElement('div');
    modal.className = 'modal';
    if(opts.wide) modal.style.maxWidth = '880px';
    if(opts.maxWidth) modal.style.maxWidth = opts.maxWidth;

    modal.innerHTML = `
      <div class="modal-head">
        <h2>${opts.title}</h2>
        <button class="modal-close" onclick="ModalSys.close()">${ICONS.close}</button>
      </div>
      <div class="modal-body">${opts.body}</div>
      ${opts.actions ? `<div style="padding:14px 22px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end">${opts.actions}</div>` : ''}
    `;

    bg.appendChild(modal);
    root.appendChild(bg);
    this.current = bg;
    document.addEventListener('keydown', this.escHandler);
    if(opts.onMount) setTimeout(()=>opts.onMount(modal), 50);
  },
  close(){
    if(this.current){
      this.current.remove();
      this.current = null;
      document.removeEventListener('keydown', this.escHandler);
    }
  },
  escHandler(e){if(e.key==='Escape') ModalSys.close()}
};

const Router = {
  routes: {},
  current: null,
  register(path, handler){this.routes[path] = handler},
  go(path){window.location.hash = '#'+path},
  init(){
    window.addEventListener('hashchange',()=>this.handle());
    this.handle();
  },
  handle(){
    const hash = window.location.hash.slice(1) || '/command';
    const [path,...params] = hash.split('/').filter(Boolean);
    const route = '/'+(path||'command');
    const handler = this.routes[route];
    if(handler){
      this.current = route;
      const page = document.getElementById('page');
      page.innerHTML = '';
      page.appendChild(handler(params));
      page.scrollTop = 0;
      App.renderSidebar();
    }
  }
};

function drawNetworkGraph(kols){
  const canvas = document.getElementById('network-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.offsetWidth;
  const h = canvas.height = 480;
  ctx.clearRect(0,0,w,h);

  // Position nodes in force-directed layout (simulated)
  const nodes = kols.map((k,i)=>{
    const angle = (i/kols.length) * Math.PI*2;
    const r = k.tier==='Global' ? 130 : k.tier==='National' ? 200 : 250;
    return {
      id:k.id,
      x:w/2 + Math.cos(angle)*r + (Math.random()-0.5)*40,
      y:h/2 + Math.sin(angle)*r*0.65 + (Math.random()-0.5)*30,
      tier:k.tier,
      name:k.name.split(',')[0],
      sentiment:k.sentiment,
      influence:k.influence
    };
  });

  // Draw edges (simulated co-authorship/co-trial connections)
  const edges = [];
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dist = Math.hypot(nodes[i].x-nodes[j].x, nodes[i].y-nodes[j].y);
      if(dist < 250 && Math.random() > 0.4){
        edges.push([i,j,dist]);
      }
    }
  }

  ctx.lineWidth = 1;
  edges.forEach(([i,j,dist])=>{
    const opacity = Math.max(0.05, 1 - dist/300);
    ctx.strokeStyle = `rgba(129, 140, 248, ${opacity*0.4})`;
    ctx.beginPath();
    ctx.moveTo(nodes[i].x, nodes[i].y);
    ctx.lineTo(nodes[j].x, nodes[j].y);
    ctx.stroke();
  });

  // Draw nodes
  nodes.forEach(n=>{
    const size = n.tier==='Global' ? 14 : n.tier==='National' ? 10 : 7;
    const color = n.tier==='Global' ? '#eab308' : n.tier==='National' ? '#6366f1' : '#22d3ee';

    // Glow
    if(n.tier==='Global'){
      const grad = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,size*3);
      grad.addColorStop(0,'rgba(234,179,8,0.4)');
      grad.addColorStop(1,'rgba(234,179,8,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(n.x,n.y,size*3,0,Math.PI*2);
      ctx.fill();
    }

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(n.x,n.y,size,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label for global KOLs
    if(n.tier==='Global'){
      ctx.font = '10px Inter, sans-serif';
      ctx.fillStyle = 'rgba(240,244,250,0.9)';
      ctx.textAlign = 'center';
      ctx.fillText(n.name, n.x, n.y + size + 14);
    }
  });
}

window.handleIQVIAUpload = function(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data,{type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws);
      alert(`✓ Successfully parsed ${json.length} rows from ${file.name}\n\nColumns detected: ${Object.keys(json[0]||{}).join(', ')}\n\nData ingested into Synapse pipeline. AI analysis will run in background.`);
    }catch(err){
      alert('Error parsing file: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
};
